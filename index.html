<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Blitz - Sword Coast</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--font:'Silkscreen',cursive;--bg:#0f0f23;--bg2:#1a1a2e;--border:#4a3728;--gold:#ffd700;--text:#e0d8c0;--muted:#8b7355;--dim:#6a6a8e;--dark:#0a0a1e}
body{background:var(--bg2);color:var(--text);font-family:var(--font);overflow:hidden;height:100vh;height:100dvh;width:100vw}
.app{display:flex;height:100vh;height:100dvh;width:100vw}

/* SIDEBAR */
.sidebar{width:400px;min-width:400px;background:var(--bg);border-right:4px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-title{text-align:center;padding:16px 12px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid var(--border)}
.sidebar-title h1{font-size:24px;color:var(--gold);text-shadow:2px 2px 0 #8b6914,0 0 10px rgba(255,215,0,.5);letter-spacing:4px}
.sidebar-title .subtitle{font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:2px}
.search-bar{padding:10px 12px;background:var(--dark);border-bottom:3px solid var(--border);position:relative}
.search-wrap{display:flex;gap:6px}
.search-input{flex:1;background:var(--bg2);border:2px solid #2a2a4e;color:var(--text);font-family:var(--font);font-size:11px;padding:10px 12px;border-radius:4px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:#4a4a6e}
.search-btn{background:#2a1a0e;border:2px solid var(--border);color:var(--gold);font-family:var(--font);font-size:12px;padding:8px 14px;cursor:pointer;border-radius:4px;transition:all .2s}
.search-btn:hover{border-color:var(--gold)}
.suggestions{position:absolute;left:12px;right:12px;top:100%;background:var(--bg);border:2px solid var(--border);border-top:none;border-radius:0 0 4px 4px;z-index:20;display:none;max-height:240px;overflow-y:auto}
.suggestions.active{display:block}
.suggestion-item{padding:10px 14px;font-size:11px;color:#c0b898;cursor:pointer;border-bottom:1px solid var(--bg2);display:flex;align-items:center;gap:10px;transition:all .15s}
.suggestion-item:hover{background:#1a1a38;color:var(--gold)}
.suggestion-item .s-type{font-size:9px;color:var(--dim);min-width:50px}
.tab-bar{display:flex;background:var(--dark);border-bottom:3px solid var(--border)}
.tab-btn{flex:1;padding:11px 4px;font-family:var(--font);font-size:10px;color:var(--dim);background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;text-align:center}
.tab-btn:hover{color:#c0b898;background:var(--bg2)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--bg2)}
.tab-content{flex:1;overflow-y:auto;padding:12px}
.tab-panel{display:none}.tab-panel.active{display:block}

/* CARDS */
.character-card,.npc-card{display:flex;align-items:center;gap:14px;padding:14px 12px;margin-bottom:10px;background:var(--bg2);border:2px solid #2a2a4e;border-radius:6px;cursor:pointer;transition:all .2s}
.character-card:hover{border-color:var(--gold);background:#1e1e3a;transform:translateX(4px)}
.npc-card:hover{border-color:#6ab4ff;background:#1e1e3a;transform:translateX(4px)}
.portrait{width:56px;height:56px;min-width:56px;image-rendering:pixelated;border:2px solid var(--border);background:#2a2a4e;border-radius:4px}
.portrait canvas{width:56px;height:56px;image-rendering:pixelated}
.char-info,.npc-info{display:flex;flex-direction:column;gap:4px;overflow:hidden}
.char-name{font-size:12px;color:var(--gold)}
.char-class{font-size:10px;color:var(--muted)}
.char-species{font-size:9px;color:var(--dim)}
.npc-icon{width:44px;height:44px;min-width:44px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--bg2)}
.npc-name{font-size:12px;color:#6ab4ff}
.npc-role{font-size:10px;color:var(--muted)}
.npc-status{font-size:9px;padding:3px 8px;border-radius:3px;display:inline-block;margin-top:3px}
.npc-status.friendly{background:#1a3a1a;color:#4ae04a;border:1px solid #2a6a2a}
.npc-status.hostile{background:#3a1a1a;color:#e04a4a;border:1px solid #6a2a2a}
.npc-status.neutral{background:#2a2a1a;color:#c0b060;border:1px solid #5a5a2a}
.npc-status.unknown{background:#1a1a2a;color:#8080a0;border:1px solid #3a3a5a}
.empty-state{font-size:11px;color:#4a4a6e;padding:24px;text-align:center;line-height:2}
.sr-item{padding:12px;margin-bottom:6px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid var(--gold);cursor:pointer;transition:all .15s;font-size:11px;display:flex;align-items:center;gap:10px}
.sr-item:hover{border-color:var(--gold);background:#1a1a38;color:var(--gold)}
.sr-item .sr-type{font-size:8px;color:var(--muted);min-width:44px;text-transform:uppercase}
.search-results{display:none}.search-results.active{display:block}
.search-results-header{display:flex;justify-content:space-between;align-items:center;padding:6px 0 10px;border-bottom:2px solid #2a2a4e;margin-bottom:10px}
.search-results-header h3{font-size:11px;color:var(--muted)}
.sr-close{font-size:10px;color:var(--dim);cursor:pointer;background:none;border:1px solid #2a2a4e;padding:4px 10px;font-family:var(--font);border-radius:3px}.sr-close:hover{color:var(--gold);border-color:var(--gold)}

/* TIMELINE */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:#2a2a4e}
.session-block{margin-bottom:14px}
.session-header{font-size:11px;color:var(--gold);padding:10px 12px;background:var(--bg2);border:2px solid var(--border);border-radius:6px;position:relative;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.session-header:hover{border-color:var(--gold);background:#2a1a0e}
.session-header::before{content:'';position:absolute;left:-20px;top:50%;transform:translateY(-50%);width:12px;height:12px;background:var(--gold);border:2px solid #8b6914;border-radius:2px}
.session-header .session-label{font-size:9px;color:var(--muted);display:block;margin-bottom:3px}
.session-header .toggle-icon{font-size:10px;color:var(--muted);transition:transform .2s;margin-left:auto}
.session-block.collapsed .toggle-icon{transform:rotate(-90deg)}
.session-block.collapsed .session-events{display:none}
.session-events{margin-top:8px}
.timeline-event{margin:5px 0;padding:10px 12px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid #6a4a2a;cursor:pointer;transition:all .2s;font-size:10px;color:#c0b898;line-height:1.6}
.timeline-event:hover{border-color:var(--gold);background:#1a1a38}
.timeline-event .te-title{color:#e0c878;font-size:10px}

/* POPUPS */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:99}.overlay.active{display:block}
.popup-close{font-size:16px;color:var(--muted);cursor:pointer;background:none;border:2px solid var(--border);padding:5px 10px;font-family:var(--font);transition:all .2s;border-radius:4px}.popup-close:hover{color:var(--gold);border-color:var(--gold)}
.location-popup,.char-detail-popup,.tl-detail,.npc-detail-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg);border:4px solid var(--border);border-radius:6px;z-index:100;overflow-y:auto;box-shadow:0 0 60px rgba(0,0,0,.8)}
.location-popup.active,.char-detail-popup.active,.tl-detail.active,.npc-detail-popup.active{display:block}
.location-popup{width:580px;max-height:85vh}
.char-detail-popup{width:560px;max-height:85vh}
.tl-detail{width:580px;max-height:85vh}
.npc-detail-popup{width:540px;max-height:80vh}
.popup-header,.tl-detail-header,.npc-detail-header{padding:18px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.popup-header h2,.tl-detail-header h2,.npc-detail-header h2{font-size:14px;color:var(--gold);text-shadow:2px 2px 0 #8b6914}
.popup-summary{padding:18px;font-size:12px;line-height:1.9;color:#c0b898;border-bottom:2px solid #2a2a4e}
.event-list{padding:12px 18px 18px}
.event-list h3{font-size:12px;color:var(--muted);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #2a2a4e}
.event-item{padding:12px;margin-bottom:10px;background:var(--bg2);border:2px solid #2a2a4e;border-left:4px solid var(--gold);cursor:pointer;transition:all .2s;border-radius:4px}
.event-item:hover{border-color:var(--gold);background:#1e1e3a}
.event-item .event-title{font-size:11px;color:var(--gold);margin-bottom:4px}
.event-item .event-preview{font-size:10px;color:var(--dim);line-height:1.6}
.event-detail{display:none;padding:12px;margin-top:8px;background:var(--dark);border:1px solid #2a2a4e;font-size:11px;color:#c0b898;line-height:1.9;border-radius:4px}.event-detail.active{display:block}

/* CHAR DETAIL */
.char-detail-header{padding:18px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid var(--border);display:flex;gap:18px;align-items:center}
.char-detail-portrait{width:80px;height:80px;min-width:80px;image-rendering:pixelated;border:3px solid var(--gold);border-radius:6px}
.char-detail-portrait canvas{width:80px;height:80px;image-rendering:pixelated}
.char-detail-info h2{font-size:14px;color:var(--gold);text-shadow:2px 2px 0 #8b6914}
.char-detail-info .detail-class{font-size:11px;color:#c0b898;margin-top:5px}
.char-detail-info .detail-species{font-size:10px;color:var(--dim);margin-top:3px}
.char-detail-body{padding:18px;font-size:11px;line-height:1.9;color:#c0b898}
.char-detail-body .stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a2a4e;font-size:11px}
.char-detail-body .stat-label{color:var(--muted)}.char-detail-body .stat-value{color:var(--gold)}
.section-toggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:10px 0;margin-top:14px;border-top:2px solid #2a2a4e}
.section-toggle h3{font-size:12px;color:var(--muted)}
.section-toggle .tog-icon{font-size:10px;color:var(--muted);transition:transform .2s}
.section-toggle.collapsed .tog-icon{transform:rotate(-90deg)}
.section-body{overflow:hidden;transition:max-height .3s ease}
.section-body.collapsed{max-height:0!important;padding:0!important;overflow:hidden}
.section-body p{font-size:11px;line-height:1.9;padding:8px 0}
.personal-events{margin-top:14px;padding-top:14px;border-top:2px solid #2a2a4e}
.personal-events h3{font-size:12px;color:var(--muted);margin-bottom:10px}
.pe-item{padding:10px 12px;margin-bottom:6px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid #6a4a8a;font-size:10px;color:#c0b898;line-height:1.7;border-radius:4px}
.pe-item .pe-label{color:#b090d0;font-size:10px;margin-bottom:3px;font-weight:700}

/* NPC/TL DETAIL */
.npc-detail-body{padding:18px;font-size:11px;line-height:1.9;color:#c0b898}
.npc-detail-body .npc-events{padding-top:14px;margin-top:14px;border-top:2px solid #2a2a4e}
.npc-detail-body .npc-events h3{font-size:12px;color:var(--muted);margin-bottom:10px}
.tl-detail-body{padding:18px}
.tl-detail-body .recap{font-size:11px;line-height:1.9;color:#c0b898;margin-bottom:14px}
.ref-section{margin-top:14px}
.ref-section h4{font-size:11px;color:var(--muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #2a2a4e}
.ref-list{list-style:none}
.ref-list li{padding:8px 12px;margin-bottom:5px;font-size:11px;cursor:pointer;border:1px solid transparent;border-radius:4px;transition:all .15s;display:flex;align-items:center;gap:10px}
.ref-list li:hover{border-color:var(--gold);background:#1a1a38;color:var(--gold)}
.ref-list li .ref-icon{font-size:9px;min-width:14px}
.ref-list li.place-ref .ref-icon{color:#ff6b35}
.ref-list li.npc-ref .ref-icon{color:#6ab4ff}

/* MAP */
.map-container{flex:1;position:relative;overflow:hidden;background:#071828}
.map-viewport{width:100%;height:100%;position:relative;overflow:hidden;cursor:grab;touch-action:none}.map-viewport:active{cursor:grabbing}
.map-canvas{position:absolute;transform-origin:0 0}
.map-svg{width:2000px;height:1600px}
.location-marker{position:absolute;cursor:pointer;z-index:5;transition:transform .2s}
.location-marker:hover{transform:scale(1.3);z-index:6}
.location-marker.highlighted .marker-dot{background:#fff;border-color:var(--gold);box-shadow:0 0 20px var(--gold),0 0 40px rgba(255,215,0,.5)}
.marker-dot{width:20px;height:20px;background:var(--gold);border:3px solid #8b6914;border-radius:3px;animation:pulse 2.5s ease-in-out infinite}
.marker-visited .marker-dot{background:#ff6b35;border-color:#a0421f}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(255,215,0,.4)}50%{box-shadow:0 0 14px rgba(255,215,0,.7)}}
.marker-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--gold);text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 2px 6px rgba(0,0,0,.9);white-space:nowrap;pointer-events:none}
.map-title{position:absolute;top:16px;right:16px;z-index:8}
.map-title .map-subtitle{font-size:10px;color:var(--muted);letter-spacing:3px}
.zoom-controls{position:absolute;bottom:16px;right:16px;z-index:8;display:flex;flex-direction:column;gap:4px}
.zoom-btn{width:38px;height:38px;background:var(--bg);border:2px solid var(--border);color:var(--gold);font-family:var(--font);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;border-radius:4px}
.zoom-btn:hover{border-color:var(--gold);background:var(--bg2)}
.legend{position:absolute;bottom:16px;left:16px;z-index:8;background:rgba(15,15,35,.92);border:2px solid var(--border);padding:10px 12px;border-radius:4px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:9px}
.legend-dot{width:12px;height:12px;border:2px solid;border-radius:3px}
.legend-dot.visited{background:#ff6b35;border-color:#a0421f}.legend-dot.known{background:var(--gold);border-color:#8b6914}

/* MOBILE */
@media(max-width:900px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:unset;height:55vh;border-right:none;border-bottom:4px solid var(--border)}
  .map-container{height:45vh}
  .sidebar-title{padding:10px 8px}
  .sidebar-title h1{font-size:18px}
  .location-popup,.char-detail-popup,.tl-detail,.npc-detail-popup{width:95vw;max-height:80vh;top:50%;left:50%}
  .marker-label{font-size:7px}
  .legend{bottom:8px;left:8px;padding:6px 8px}
  .zoom-controls{bottom:8px;right:8px}
  .zoom-btn{width:34px;height:34px;font-size:14px}
}
@media(max-width:500px){
  .sidebar{height:50vh}
  .map-container{height:50vh}
  .sidebar-title h1{font-size:16px;letter-spacing:2px}
  .tab-btn{font-size:8px;padding:8px 2px}
  .character-card,.npc-card{padding:10px 8px;gap:10px}
  .char-name,.npc-name{font-size:11px}
  .popup-header h2,.tl-detail-header h2,.npc-detail-header h2{font-size:12px}
}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-title"><h1>THE BLITZ</h1><div class="subtitle">TYRANNY OF DRAGONS</div></div>
    <div class="search-bar"><div class="search-wrap"><input class="search-input" id="searchInput" type="text" placeholder="Sök plats, namn..."><button class="search-btn" id="searchBtn">&#x1F50D;</button></div><div class="suggestions" id="suggestions"></div></div>
    <div class="tab-bar"><button class="tab-btn active" data-tab="adventurers">ÄVENTYRARE</button><button class="tab-btn" data-tab="history">HISTORIK</button><button class="tab-btn" data-tab="npcs">NPC:er</button></div>
    <div class="tab-content"><div class="tab-panel active" id="tab-adventurers"></div><div class="tab-panel" id="tab-history"></div><div class="tab-panel" id="tab-npcs"></div><div class="tab-panel" id="tab-search"></div></div>
  </div>
  <div class="map-container">
    <div class="map-title"><div class="map-subtitle">SWORD COAST</div></div>
    <div class="map-viewport" id="mapViewport"><div class="map-canvas" id="mapCanvas"><svg class="map-svg" id="mapSvg" viewBox="0 0 2000 1600"></svg></div></div>
    <div class="zoom-controls"><button class="zoom-btn" onclick="zoomIn()">+</button><button class="zoom-btn" onclick="zoomOut()">-</button><button class="zoom-btn" onclick="resetView()" style="font-size:9px">R</button></div>
    <div class="legend"><div class="legend-item"><div class="legend-dot visited"></div><span>Besökta platser</span></div><div class="legend-item"><div class="legend-dot known"></div><span>Kända platser</span></div></div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="location-popup" id="locationPopup"><div class="popup-header"><h2 id="popupTitle"></h2><button class="popup-close" onclick="closePopup()">X</button></div><div class="popup-summary" id="popupSummary"></div><div class="event-list" id="popupEvents"></div></div>
<div class="char-detail-popup" id="charDetailPopup"><div class="char-detail-header"><div class="char-detail-portrait" id="charDetailPortrait"></div><div class="char-detail-info"><h2 id="charDetailName"></h2><div class="detail-class" id="charDetailClass"></div><div class="detail-species" id="charDetailSpecies"></div></div><button class="popup-close" onclick="closePopup()" style="margin-left:auto">X</button></div><div class="char-detail-body" id="charDetailBody"></div></div>
<div class="tl-detail" id="tlDetail"><div class="tl-detail-header"><h2 id="tlDetailTitle"></h2><button class="popup-close" onclick="closePopup()">X</button></div><div class="tl-detail-body" id="tlDetailBody"></div></div>
<div class="npc-detail-popup" id="npcDetailPopup"><div class="npc-detail-header"><h2 id="npcDetailTitle"></h2><button class="popup-close" onclick="closePopup()">X</button></div><div class="npc-detail-body" id="npcDetailBody"></div></div>
<script>
const characters=[
{id:'haldan',name:'Haldan Askvandrare',class:'Ranger',subclass:'Monster Slayer',species:'Variant Human',org:'Emerald Enclave',age:56,gender:'Male',appearance:{skin:'Blek',eyes:'Bruna',hair:'Rakad'},backstory:'Född i Greenest men sökte sig tidigt till skogarna. Tränad av Emerald Enclave att jaga monster. Förlorade sitt team i en strid mot en drake – enda överlevaren. Räddade baby-Theron från ruinerna av en klan förstörd av den blå draken Verustraz. Hemlig lönnmördare för Enclaven.',personalEvents:[{label:'Drakjakt',text:'Förlorade hela sitt team i striden mot en drake. Fick mekaniska fingrar och djupa ärr.'},{label:'Räddade Theron',text:'Hittade baby-Theron i askan av hans förstörda klan och bar honom till Greenest.'},{label:'Emerald Enclave',text:'Rekryterades och tränades som monsterjägare och hemlig lönnmördare.'},{label:'Mötte Cedric',text:'Korsade vägar med Cedric – gemensamt intresse i kunskap om monster.'},{label:'Vaktare i skuggorna',text:'Har vaktat Theron på avstånd sedan han lämnade honom vid Greenests portar.'}]},
{id:'theron',name:'Theron Goldlight',class:'Paladin',subclass:'Oath of the Watchers',species:'Dragonborn (Gold)',org:'Order of the Gauntlet',gender:'Male',appearance:{skin:'Guld',eyes:'Röda',hair:'Röd'},backstory:'Lämnades som spädbarn vid Greenests portar efter att hans klan utplånades av draken Verustraz (alias Pyotr). Arbetade som stadsvakt och tränade sitt Watcher\'s Eye. Fann hopp i Bahamut och svor att skydda de svaga. Vapenbroder med Oweyn.',personalEvents:[{label:'Överlevde folkmordet',text:'Hela hans klan utplånades av draken Verustraz. Räddades som spädbarn.'},{label:'Stadsvakt i Greenest',text:'Arbetade som stadsvakt och utvecklade sitt Watcher\'s Eye.'},{label:'Fann Bahamut',text:'I sin förtvivlan fann han hopp i rättvisans fader Bahamut.'},{label:'Order of the Gauntlet',text:'Gick med i riddarorden och steg i graderna.'},{label:'Mentor åt Oweyn',text:'Tog Oweyn under sitt förmyndarskap som squire.'}]},
{id:'oweyn',name:'Oweyn Howell',class:'Fighter',subclass:'Battle Master',species:'Custom Lineage',org:'Order of the Gauntlet',gender:'Male',appearance:{},backstory:'Från Greenest, åkte till Baldur\'s Gate för att söka äventyr. Rekryterad av Order of the Gauntlet som squire under Theron. Har klarat sina prov. Vapenbroder med Theron.',personalEvents:[{label:'Lämnade Greenest',text:'Reste till Baldur\'s Gate för att söka äventyr.'},{label:'Rekryterad som squire',text:'Placerades under Therons förmyndarskap i Order of the Gauntlet.'},{label:'Klarade proven',text:'Klarade alla prov som krävdes efter lång kamp.'},{label:'Fullvärdig riddare',text:'Uppsteg till fullvärdig medlem – vapenbroder med Theron.'},{label:'Unarmed fighting',text:'Specialiserade sig i obeväpnad stridsteknik.'}]},

function renderCharacters(){const l=document.getElementById('tab-adventurers');l.innerHTML='';characters.forEach(c=>{const d=document.createElement('div');d.className='character-card';d.onclick=()=>showCharacterDetail(c);const p=document.createElement('div');p.className='portrait';const cv=document.createElement('canvas');p.appendChild(cv);drawPortrait(cv,c.id);d.appendChild(p);const i=document.createElement('div');i.className='char-info';i.innerHTML=`<div class="char-name">${c.name}</div><div class="char-class">${c.subclass}</div><div class="char-species">${c.species}</div>`;d.appendChild(i);l.appendChild(d)})}
function renderNPCs(){const p=document.getElementById('tab-npcs');p.innerHTML='';if(!npcsData.length){p.innerHTML='<div class="empty-state">Inga NPC:er påträffade ännu.<br><br>NPC:er dyker upp här efter varje session.</div>';return}npcsData.forEach(n=>{const c=document.createElement('div');c.className='npc-card';c.onclick=()=>showNPCDetail(n);const ic=document.createElement('div');ic.className='npc-icon';ic.textContent=n.status==='friendly'?'😊':n.status==='hostile'?'💀':'😐';c.appendChild(ic);const i=document.createElement('div');i.className='npc-info';const sl={friendly:'Vänlig',hostile:'Fiende',neutral:'Neutral',unknown:'Okänd'};i.innerHTML=`<div class="npc-name">${n.name}</div><div class="npc-role">${n.role||''}</div><span class="npc-status ${n.status}">${sl[n.status]||'Okänd'}</span>`;c.appendChild(i);p.appendChild(c)})}
function renderTimeline(){const p=document.getElementById('tab-history');p.innerHTML='';const tl=document.createElement('div');tl.className='timeline';sessions.forEach(s=>{const b=document.createElement('div');b.className='session-block';const h=document.createElement('div');h.className='session-header';h.innerHTML=`<div><span class="session-label">${s.label}</span>${s.title}</div><span class="toggle-icon">▼</span>`;h.onclick=()=>b.classList.toggle('collapsed');b.appendChild(h);const w=document.createElement('div');w.className='session-events';s.events.forEach(ev=>{const it=document.createElement('div');it.className='timeline-event';it.innerHTML=`<div class="te-title">${ev.title}</div>`;it.onclick=e=>{e.stopPropagation();showTimelineDetail(ev)};w.appendChild(it)});b.appendChild(w);tl.appendChild(b)});p.appendChild(tl)}
function renderMarkers(){const c=document.getElementById('mapCanvas');c.querySelectorAll('.location-marker').forEach(m=>m.remove());locations.forEach(l=>{const m=document.createElement('div');m.className=`location-marker ${l.visited?'marker-visited':''}`;m.id='marker-'+l.id;m.style.left=l.x+'px';m.style.top=l.y+'px';m.onclick=e=>{e.stopPropagation();showLocation(l)};m.innerHTML=`<div class="marker-label">${l.name}</div><div class="marker-dot"></div>`;c.appendChild(m)})}

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active');document.getElementById('tab-search').classList.remove('active')})});

// ===== SEARCH =====
function buildSearchIndex(){const idx=[];locations.forEach(l=>idx.push({type:'Plats',name:l.name,action:()=>showLocation(l),locId:l.id}));characters.forEach(c=>idx.push({type:'Karaktär',name:c.name,action:()=>showCharacterDetail(c)}));npcsData.forEach(n=>idx.push({type:'NPC',name:n.name,desc:n.desc,action:()=>showNPCDetail(n)}));sessions.forEach(s=>s.events.forEach(ev=>idx.push({type:'Händelse',name:ev.title,action:()=>showTimelineDetail(ev),places:ev.places})));return idx}
let searchIndex=buildSearchIndex();
function normalize(s){return s.toLowerCase().replace(/[åä]/g,'a').replace(/[ö]/g,'o')}
function doSearch(q){if(!q.trim())return[];const n=normalize(q);return searchIndex.filter(i=>normalize(i.name).includes(n)||(i.desc&&normalize(i.desc).includes(n)))}
const sI=document.getElementById('searchInput'),sE=document.getElementById('suggestions');
sI.addEventListener('input',()=>{const q=sI.value;if(q.length<2){sE.classList.remove('active');return}const r=doSearch(q).slice(0,8);if(!r.length){sE.classList.remove('active');return}sE.innerHTML='';r.forEach(i=>{const d=document.createElement('div');d.className='suggestion-item';d.innerHTML=`<span class="s-type">${i.type}</span>${i.name}`;d.onclick=()=>{sE.classList.remove('active');sI.value=i.name;if(i.action)i.action()};sE.appendChild(d)});sE.classList.add('active')});
sI.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();executeSearch()}});
document.getElementById('searchBtn').addEventListener('click',executeSearch);
document.addEventListener('click',e=>{if(!e.target.closest('.search-bar'))sE.classList.remove('active')});
function executeSearch(){sE.classList.remove('active');const q=sI.value;if(!q.trim())return;const r=doSearch(q);const p=document.getElementById('tab-search');p.innerHTML='';const s=document.createElement('div');s.className='search-results active';s.innerHTML=`<div class="search-results-header"><h3>"${q}" (${r.length})</h3><button class="sr-close" onclick="closeSearchResults()">X</button></div>`;if(!r.length)s.innerHTML+='<div class="empty-state">Inga resultat.</div>';else r.forEach(i=>{const d=document.createElement('div');d.className='sr-item';d.innerHTML=`<span class="sr-type">${i.type}</span>${i.name}`;d.onclick=()=>{if(i.action)i.action();if(i.locId){highlightMarker(i.locId);setTimeout(()=>unhighlightMarker(i.locId),3000)}if(i.places)i.places.forEach(x=>{highlightMarker(x);setTimeout(()=>unhighlightMarker(x),3000)})};s.appendChild(d)});p.appendChild(s);document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));p.classList.add('active')}
function closeSearchResults(){document.getElementById('tab-search').classList.remove('active');document.querySelector('.tab-btn[data-tab="adventurers"]').classList.add('active');document.getElementById('tab-adventurers').classList.add('active');sI.value=''}

// ===== POPUPS =====
function showLocation(l){document.getElementById('popupTitle').textContent=l.name;document.getElementById('popupSummary').textContent=l.summary;const e=document.getElementById('popupEvents');e.innerHTML='<h3>HÄNDELSER</h3>';if(!l.events.length)e.innerHTML+='<div class="empty-state">Inga händelser ännu.</div>';else l.events.forEach((ev,i)=>{const d=document.createElement('div');d.className='event-item';d.innerHTML=`<div class="event-title">${ev.title}</div><div class="event-preview">${ev.preview}</div><div class="event-detail" id="ed_${l.id}_${i}">${ev.detail}</div>`;d.onclick=()=>document.getElementById(`ed_${l.id}_${i}`).classList.toggle('active');e.appendChild(d)});document.getElementById('overlay').classList.add('active');document.getElementById('locationPopup').classList.add('active')}
function showCharacterDetail(ch){document.getElementById('charDetailName').textContent=ch.name;document.getElementById('charDetailClass').textContent=ch.subclass;document.getElementById('charDetailSpecies').textContent=ch.species;const p=document.getElementById('charDetailPortrait');p.innerHTML='';const cv=document.createElement('canvas');p.appendChild(cv);drawPortrait(cv,ch.id);const b=document.getElementById('charDetailBody');b.innerHTML='';const st=[];if(ch.age)st.push({l:'Ålder',v:ch.age});if(ch.gender)st.push({l:'Kön',v:ch.gender});if(ch.org)st.push({l:'Organisation',v:ch.org});if(ch.appearance.skin)st.push({l:'Hy',v:ch.appearance.skin});if(ch.appearance.eyes)st.push({l:'Ögon',v:ch.appearance.eyes});if(ch.appearance.hair)st.push({l:'Hår',v:ch.appearance.hair});st.forEach(s=>b.innerHTML+=`<div class="stat-row"><span class="stat-label">${s.l}</span><span class="stat-value">${s.v}</span></div>`);
// Collapsible backstory
b.innerHTML+=`<div class="section-toggle collapsed" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')"><h3>BAKGRUND</h3><span class="tog-icon">▼</span></div><div class="section-body collapsed" style="max-height:600px"><p>${ch.backstory}</p></div>`;
if(ch.personalEvents&&ch.personalEvents.length){let h='<div class="personal-events"><h3>SENASTE HÄNDELSER</h3>';ch.personalEvents.slice(0,5).forEach(e=>{h+=`<div class="pe-item"><div class="pe-label">${e.label}</div>${e.text}</div>`});h+='</div>';b.innerHTML+=h}document.getElementById('overlay').classList.add('active');document.getElementById('charDetailPopup').classList.add('active')}
function showNPCDetail(n){document.getElementById('npcDetailTitle').textContent=n.name;const b=document.getElementById('npcDetailBody');const sl={friendly:'Vänlig',hostile:'Fiende',neutral:'Neutral',unknown:'Okänd'};b.innerHTML=`<div><span class="npc-status ${n.status}" style="margin-bottom:10px">${sl[n.status]}</span><p style="margin-top:12px">${n.desc}</p></div>`;if(n.events&&n.events.length){let h='<div class="npc-events"><h3>HÄNDELSER MED THE BLITZ</h3>';n.events.forEach(e=>{h+=`<div class="pe-item"><div class="pe-label">${e.label}</div>${e.text}</div>`});h+='</div>';b.innerHTML+=h}else b.innerHTML+='<div class="npc-events"><h3>HÄNDELSER MED THE BLITZ</h3><div class="empty-state">Inga direkta interaktioner ännu.</div></div>';document.getElementById('overlay').classList.add('active');document.getElementById('npcDetailPopup').classList.add('active')}
function showTimelineDetail(ev){document.getElementById('tlDetailTitle').textContent=ev.title;const b=document.getElementById('tlDetailBody');b.innerHTML=`<div class="recap">${ev.recap}</div>`;if(ev.places.length){let h='<div class="ref-section"><h4>PLATSER</h4><ul class="ref-list">';ev.places.forEach(pid=>{const loc=locations.find(l=>l.id===pid);if(loc)h+=`<li class="place-ref" onmouseenter="highlightMarker('${pid}')" onmouseleave="unhighlightMarker('${pid}')" onclick="closePopup();setTimeout(()=>showLocation(locations.find(l=>l.id==='${pid}')),100)"><span class="ref-icon">&#9679;</span>${loc.name}</li>`});h+='</ul></div>';b.innerHTML+=h}if(ev.npcs&&ev.npcs.length){let h='<div class="ref-section"><h4>NPCs</h4><ul class="ref-list">';ev.npcs.forEach(n=>h+=`<li class="npc-ref"><span class="ref-icon">&#9670;</span>${n}</li>`);h+='</ul></div>';b.innerHTML+=h}document.getElementById('overlay').classList.add('active');document.getElementById('tlDetail').classList.add('active')}
function highlightMarker(id){const m=document.getElementById('marker-'+id);if(m)m.classList.add('highlighted')}
function unhighlightMarker(id){const m=document.getElementById('marker-'+id);if(m)m.classList.remove('highlighted')}
function closePopup(){document.getElementById('overlay').classList.remove('active');['locationPopup','charDetailPopup','tlDetail','npcDetailPopup'].forEach(id=>document.getElementById(id).classList.remove('active'));document.querySelectorAll('.location-marker.highlighted').forEach(m=>m.classList.remove('highlighted'))}

// ===== PAN & ZOOM (mouse + touch) =====
let scale=1,panX=0,panY=0,isDragging=false,dragSX,dragSY;
function updateTransform(){document.getElementById('mapCanvas').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`}
const vp=document.getElementById('mapViewport');
vp.addEventListener('mousedown',e=>{if(e.target.closest('.location-marker'))return;isDragging=true;dragSX=e.clientX-panX;dragSY=e.clientY-panY});
window.addEventListener('mousemove',e=>{if(!isDragging)return;panX=e.clientX-dragSX;panY=e.clientY-dragSY;updateTransform()});
window.addEventListener('mouseup',()=>isDragging=false);
vp.addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(.3,Math.min(2.5,scale+(e.deltaY>0?-.1:.1)));updateTransform()},{passive:false});
// Touch support
let lastTouchDist=0,lastTouchX=0,lastTouchY=0,touchDragging=false;
vp.addEventListener('touchstart',e=>{if(e.touches.length===1){touchDragging=true;lastTouchX=e.touches[0].clientX-panX;lastTouchY=e.touches[0].clientY-panY}if(e.touches.length===2){touchDragging=false;lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}},{passive:true});
vp.addEventListener('touchmove',e=>{if(e.touches.length===1&&touchDragging){panX=e.touches[0].clientX-lastTouchX;panY=e.touches[0].clientY-lastTouchY;updateTransform()}if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(lastTouchDist){const delta=(d-lastTouchDist)*.005;scale=Math.max(.3,Math.min(2.5,scale+delta))}lastTouchDist=d;updateTransform()}},{passive:true});
vp.addEventListener('touchend',()=>{touchDragging=false;lastTouchDist=0});
function zoomIn(){scale=Math.min(2.5,scale+.15);updateTransform()}
function zoomOut(){scale=Math.max(.3,scale-.15);updateTransform()}
function resetView(){centerOnVisited()}
function centerOnVisited(){const v=locations.filter(l=>l.visited);if(!v.length)return;let x1=Infinity,x2=-Infinity,y1=Infinity,y2=-Infinity;v.forEach(l=>{if(l.x<x1)x1=l.x;if(l.x>x2)x2=l.x;if(l.y<y1)y1=l.y;if(l.y>y2)y2=l.y});const pad=250;x1-=pad;x2+=pad;y1-=pad;y2+=pad;const ma=document.querySelector('.map-container');const vw=ma.clientWidth,vh=ma.clientHeight;scale=Math.min(vw/(x2-x1),vh/(y2-y1),1.4);scale=Math.max(.4,Math.min(1.4,scale));panX=vw/2-((x1+x2)/2)*scale;panY=vh/2-((y1+y2)/2)*scale;updateTransform()}

drawMap();renderCharacters();renderNPCs();renderTimeline();renderMarkers();setTimeout(centerOnVisited,150);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup()});
</script>
</body>
</html>
