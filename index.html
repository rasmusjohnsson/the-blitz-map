<style>

body{background:#1a1a2e;color:#e0d8c0;font-family:'Press Start 2P',monospace;overflow:hidden;height:100vh;width:100vw}

.character-card{display:flex;align-items:center;gap:12px;padding:12px 10px;margin-bottom:8px;background:#1a1a2e;border:2px solid #2a2a4e;border-radius:4px;cursor:pointer;transition:all .2s}

.npc-info{display:flex;flex-direction:column;gap:4px;overflow:hidden}
.npc-name{font-size:9px;color:#6ab4ff}
.npc-role{font-size:7px;color:#8b7355}
.npc-status{font-size:6px;padding:2px 6px;border-radius:2px;display:inline-block;margin-top:2px}
.npc-status.friendly{background:#1a3a1a;color:#4ae04a;border:1px solid #2a6a2a}
.npc-status.hostile{background:#3a1a1a;color:#e04a4a;border:1px solid #6a2a2a}
.npc-status.neutral{background:#2a2a1a;color:#c0b060;border:1px solid #5a5a2a}
.npc-status.unknown{background:#1a1a2a;color:#8080a0;border:1px solid #3a3a5a}
.empty-state{font-size:8px;color:#4a4a6e;padding:20px;text-align:center;line-height:2}
.timeline{position:relative;padding-left:22px}
.timeline::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:#2a2a4e}
.session-block{margin-bottom:14px}
.session-header{font-size:9px;color:#ffd700;padding:8px 10px;background:#1a1a2e;border:2px solid #4a3728;border-radius:4px;position:relative;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.session-header:hover{border-color:#ffd700;background:#2a1a0e}
.session-header::before{content:'';position:absolute;left:-18px;top:50%;transform:translateY(-50%);width:12px;height:12px;background:#ffd700;border:2px solid #8b6914;border-radius:2px}
.session-header .session-label{font-size:7px;color:#8b7355;display:block;margin-bottom:3px}
.session-header .toggle-icon{font-size:9px;color:#8b7355;transition:transform .2s;margin-left:auto;min-width:14px}
.session-block.collapsed .toggle-icon{transform:rotate(-90deg)}
.session-block.collapsed .session-events{display:none}
.session-events{margin-top:8px}
.timeline-event{margin:5px 0;padding:10px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid #6a4a2a;cursor:pointer;transition:all .2s;font-size:8px;color:#c0b898;line-height:1.6}
.timeline-event:hover{border-color:#ffd700;background:#1a1a38}
.timeline-event .te-title{color:#e0c878;font-size:8px}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:99}.overlay.active{display:block}
.popup-close{font-size:14px;color:#8b7355;cursor:pointer;background:none;border:2px solid #4a3728;padding:4px 8px;font-family:'Press Start 2P',monospace;transition:all .2s}.popup-close:hover{color:#ffd700;border-color:#ffd700}
.location-popup,.char-detail-popup,.tl-detail,.npc-detail-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0f0f23;border:4px solid #4a3728;border-radius:4px;z-index:100;overflow-y:auto;box-shadow:0 0 40px rgba(0,0,0,.8)}
.location-popup.active,.char-detail-popup.active,.tl-detail.active,.npc-detail-popup.active{display:block}
.location-popup{width:520px;max-height:80vh}.char-detail-popup{width:480px;max-height:80vh}.tl-detail{width:520px;max-height:80vh}.npc-detail-popup{width:480px;max-height:75vh}
.popup-header,.tl-detail-header,.npc-detail-header{padding:16px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid #4a3728;display:flex;justify-content:space-between;align-items:center}
.popup-header h2,.tl-detail-header h2,.npc-detail-header h2{font-size:12px;color:#ffd700;text-shadow:2px 2px 0 #8b6914}
.popup-summary{padding:16px;font-size:9px;line-height:1.8;color:#c0b898;border-bottom:2px solid #2a2a4e}
.event-list{padding:10px 16px 16px}
.event-list h3{font-size:9px;color:#8b7355;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #2a2a4e}

.event-item:hover{border-color:#ffd700;background:#1e1e3a}
.event-item .event-title{font-size:8px;color:#ffd700;margin-bottom:4px}
.event-item .event-preview{font-size:7px;color:#6a6a8e;line-height:1.6}
.event-detail{display:none;padding:10px;margin-top:8px;background:#0a0a1e;border:1px solid #2a2a4e;font-size:8px;color:#c0b898;line-height:1.8}.event-detail.active{display:block}
.char-detail-header{padding:16px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid #4a3728;display:flex;gap:16px;align-items:center}
.char-detail-portrait{width:72px;height:72px;min-width:72px;image-rendering:pixelated;border:3px solid #ffd700}
.char-detail-portrait canvas{width:72px;height:72px;image-rendering:pixelated}
.char-detail-info h2{font-size:12px;color:#ffd700;text-shadow:2px 2px 0 #8b6914}
.char-detail-info .detail-class{font-size:9px;color:#c0b898;margin-top:5px}
.char-detail-info .detail-species{font-size:8px;color:#6a6a8e;margin-top:3px}
.char-detail-body{padding:16px;font-size:8px;line-height:1.8;color:#c0b898}
.char-detail-body .stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2a2a4e}
.char-detail-body .stat-label{color:#8b7355}.char-detail-body .stat-value{color:#ffd700}

.char-detail-body .backstory h3,.char-detail-body .personal-events h3{font-size:9px;color:#8b7355;margin-bottom:10px}
.pe-item{padding:8px;margin-bottom:5px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid #6a4a8a;font-size:7px;color:#c0b898;line-height:1.6}
.pe-item .pe-label{color:#b090d0;font-size:7px;margin-bottom:2px}
.npc-detail-body{padding:16px;font-size:8px;line-height:1.8;color:#c0b898}
.npc-detail-body .npc-events{padding-top:14px;border-top:2px solid #2a2a4e}
.npc-detail-body .npc-events h3{font-size:9px;color:#8b7355;margin-bottom:10px}
.tl-detail-body{padding:16px}
.tl-detail-body .recap{font-size:8px;line-height:1.8;color:#c0b898;margin-bottom:14px}
.ref-section{margin-top:12px}
.ref-section h4{font-size:8px;color:#8b7355;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #2a2a4e}
.ref-list{list-style:none}
.ref-list li{padding:6px 10px;margin-bottom:4px;font-size:8px;cursor:pointer;border:1px solid transparent;border-radius:3px;transition:all .15s;display:flex;align-items:center;gap:8px}
.ref-list li:hover{border-color:#ffd700;background:#1a1a38;color:#ffd700}
.ref-list li .ref-icon{font-size:7px;min-width:14px}
.ref-list li.place-ref .ref-icon{color:#ff6b35}
.ref-list li.npc-ref .ref-icon{color:#6ab4ff}
.map-container{flex:1;position:relative;overflow:hidden;background:#071828}
.map-viewport{width:100%;height:100%;position:relative;overflow:hidden;cursor:grab}.map-viewport:active{cursor:grabbing}
.map-canvas{position:absolute;transform-origin:0 0}
.map-svg{width:1800px;height:1400px}
.location-marker{position:absolute;cursor:pointer;z-index:5;transition:transform .2s}
.location-marker:hover{transform:scale(1.3);z-index:6}
.location-marker.highlighted .marker-dot{background:#fff;border-color:#ffd700;box-shadow:0 0 20px #ffd700,0 0 40px rgba(255,215,0,.5)}
.marker-dot{width:18px;height:18px;background:#ffd700;border:3px solid #8b6914;border-radius:2px;animation:pulse 2.5s ease-in-out infinite}
.marker-visited .marker-dot{background:#ff6b35;border-color:#a0421f}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(255,215,0,.4)}50%{box-shadow:0 0 12px rgba(255,215,0,.7)}}
.marker-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:7px;color:#ffd700;text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 2px 4px rgba(0,0,0,.8);white-space:nowrap;pointer-events:none}
.map-title{position:absolute;top:16px;right:16px;z-index:8;text-align:right}
.map-title .map-subtitle{font-size:9px;color:#8b7355;letter-spacing:3px}
.zoom-controls{position:absolute;bottom:16px;right:16px;z-index:8;display:flex;flex-direction:column;gap:4px}
.zoom-btn{width:34px;height:34px;background:#0f0f23;border:2px solid #4a3728;color:#ffd700;font-family:'Press Start 2P',monospace;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.zoom-btn:hover{border-color:#ffd700;background:#1a1a2e}
.legend{position:absolute;bottom:16px;left:16px;z-index:8;background:rgba(15,15,35,.9);border:2px solid #4a3728;padding:10px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:7px}
.legend-dot{width:12px;height:12px;border:2px solid;border-radius:2px}
.legend-dot.visited{background:#ff6b35;border-color:#a0421f}.legend-dot.known{background:#ffd700;border-color:#8b6914}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f0f23}::-webkit-scrollbar-thumb{background:#4a3728;border-radius:2px}
</style>

<body>

  <div class="sidebar">

<script>
const characters=[
{id:'haldan',name:'Haldan Askvandrare',class:'Ranger',subclass:'Monster Slayer',species:'Variant Human',org:'Emerald Enclave',age:56,gender:'Male',appearance:{skin:'Blek',eyes:'Bruna',hair:'Rakad'},backstory:'Född i Greenest men sökte sig tidigt till skogarna. Tränad av Emerald Enclave att jaga monster. Förlorade sitt team i en strid mot en drake – enda överlevaren. Räddade baby-Theron från ruinerna av en klan förstörd av den blå draken Verustraz. Hemlig lönnmördare för Enclaven.',personalEvents:[{label:'Drakjakt',text:'Förlorade hela sitt team i striden mot en drake. Fick mekaniska fingrar och djupa ärr.'},{label:'Räddade Theron',text:'Hittade baby-Theron i askan av hans förstörda klan och bar honom till Greenest.'},{label:'Emerald Enclave',text:'Rekryterades och tränades som monsterjägare och hemlig lönnmördare.'},{label:'Mötte Cedric',text:'Korsade vägar med Cedric – de fann gemensamt intresse i kunskap om monster.'},{label:'Vaktare i skuggorna',text:'Har vaktat Theron på avstånd sedan han lämnade honom vid Greenests portar.'}]},
{id:'theron',name:'Theron Goldlight',class:'Paladin',subclass:'Oath of the Watchers',species:'Dragonborn (Gold)',org:'Order of the Gauntlet',gender:'Male',appearance:{skin:'Guld',eyes:'Röda',hair:'Röd'},backstory:'Lämnades som spädbarn vid Greenests portar efter att hans klan utplånades av draken Verustraz (alias Pyotr). Arbetade som stadsvakt och tränade sitt Watcher\'s Eye. Fann hopp i Bahamut och svor att skydda de svaga. Vapenbroder med Oweyn.',personalEvents:[{label:'Överlevde folkmordet',text:'Hela hans klan utplånades av draken Verustraz. Räddades som spädbarn av Haldan.'},{label:'Stadsvakt i Greenest',text:'Arbetade som stadsvakt och utvecklade sitt Watcher\'s Eye.'},{label:'Fann Bahamut',text:'I sin förtvivlan fann han hopp i rättvisans fader Bahamut.'},{label:'Order of the Gauntlet',text:'Gick med i riddarorden och steg i graderna.'},{label:'Mentor åt Oweyn',text:'Tog Oweyn under sitt förmyndarskap som squire.'}]},
{id:'oweyn',name:'Oweyn Howell',class:'Fighter',subclass:'Battle Master',species:'Custom Lineage',org:'Order of the Gauntlet',gender:'Male',appearance:{skin:'',eyes:'',hair:''},backstory:'Från Greenest, åkte till Baldur\'s Gate för att söka äventyr. Rekryterad av Order of the Gauntlet som squire under Theron. Har klarat sina prov och är nu fullvärdig medlem. Vapenbroder med Theron.',personalEvents:[{label:'Lämnade Greenest',text:'Reste till Baldur\'s Gate för att söka äventyr.'},{label:'Rekryterad som squire',text:'Placerades under Therons förmyndarskap i Order of the Gauntlet.'},{label:'Klarade proven',text:'Efter lång kamp klarade han alla prov som krävdes.'},{label:'Fullvärdig riddare',text:'Uppsteg till fullvärdig medlem – vapenbroder med Theron.'},{label:'Unarmed fighting',text:'Specialiserade sig i obeväpnad stridsteknik.'}]},
{id:'gothmog',name:'Gothmog',class:'Fighter',subclass:'Rune Knight',species:'Half-Orc',org:'',age:23,gender:'Male',appearance:{skin:'Grå',eyes:'Orange',hair:'Kal'},backstory:'Född i Greenest men försvann som barn in i Barovia. Överlevde som soldat i Valakii. Vägrade utnyttja en gömd familj och flydde. The Vistani tog ett minne från honom som betalning. Hittades av Cedric nära Greenest.',personalEvents:[{label:'Försvann till Barovia',text:'Som barn svalde dimman honom och han hamnade i det mörka Barovia.'},{label:'Soldat i Valakii',text:'Blev soldat – utnyttjades för sitt skrämmande utseende.'},{label:'Vände om',text:'Vägrade utnyttja en gömd familj. Insåg att han ville göra ondska, inte behövde.'},{label:'Runorna',text:'Fann uråldriga runor och ristade dem i sin hud – löften om vem han vägrar bli.'},{label:'The Vistani – ett minne som pris',text:'Betalade med ett dyrbart minne för att fly Barovia.'}]},
{id:'cedric',name:'Cedric Vael',class:'Wizard',subclass:'School of Divination',species:'Variant Human',org:'',age:56,gender:'Male',appearance:{skin:'Ljus',eyes:'Blå',hair:'Grå'},backstory:'Född i Greenest. Hans far Steve byggde "Kunskapens Vagn" – ett rullande bibliotek. Reser mellan riken och studerar magi. Räddade Gothmog från Barovias dimma. Har en Codex-Golem.',personalEvents:[{label:'Kunskapens Vagn',text:'Fick vagnen av sin far Steve – ett rullande bibliotek och hans hem.'},{label:'Räddade Gothmog',text:'Stängde revan i dimman med magi och räddade Gothmog utanför Greenest.'},{label:'Codex-Golemen',text:'Skapade en golem ur sin vagns böcker – en varelse av kunskap.'},{label:'Resande magiker',text:'Spenderade år med att resa och studera magi som ett levande språk.'},{label:'Samlade gruppen',text:'Sökte upp gamla vänner i Greenest och introducerade Gothmog. Början på The Blitz.'}]}

function renderCharacters(){const l=document.getElementById('tab-adventurers');l.innerHTML='';characters.forEach(c=>{const d=document.createElement('div');d.className='character-card';d.onclick=()=>showCharacterDetail(c);const p=document.createElement('div');p.className='portrait';const cv=document.createElement('canvas');p.appendChild(cv);drawPortrait(cv,c.id);d.appendChild(p);const i=document.createElement('div');i.className='char-info';i.innerHTML=`<div class="char-name">${c.name}</div><div class="char-class">${c.subclass}</div><div class="char-species">${c.species}</div>`;d.appendChild(i);l.appendChild(d)})}
function renderNPCs(){const p=document.getElementById('tab-npcs');p.innerHTML='';if(!npcsData.length){p.innerHTML='<div class="empty-state">Inga NPC:er påträffade ännu.<br><br>NPC:er dyker upp här efter varje session.</div>';return}npcsData.forEach(n=>{const c=document.createElement('div');c.className='npc-card';c.onclick=()=>showNPCDetail(n);const ic=document.createElement('div');ic.className='npc-icon';ic.textContent=n.status==='friendly'?'😊':n.status==='hostile'?'💀':n.status==='neutral'?'😐':'❓';c.appendChild(ic);const i=document.createElement('div');i.className='npc-info';const sl={friendly:'Vänlig',hostile:'Fiende',neutral:'Neutral',unknown:'Okänd'};i.innerHTML=`<div class="npc-name">${n.name}</div><div class="npc-role">${n.role||''}</div><span class="npc-status ${n.status}">${sl[n.status]||'Okänd'}</span>`;c.appendChild(i);p.appendChild(c)})}
function renderTimeline(){const p=document.getElementById('tab-history');p.innerHTML='';const tl=document.createElement('div');tl.className='timeline';sessions.forEach(s=>{const b=document.createElement('div');b.className='session-block';const h=document.createElement('div');h.className='session-header';h.innerHTML=`<div><span class="session-label">${s.label}</span>${s.title}</div><span class="toggle-icon">▼</span>`;h.onclick=()=>b.classList.toggle('collapsed');b.appendChild(h);const w=document.createElement('div');w.className='session-events';s.events.forEach(ev=>{const it=document.createElement('div');it.className='timeline-event';it.innerHTML=`<div class="te-title">${ev.title}</div>`;it.onclick=e=>{e.stopPropagation();showTimelineDetail(ev)};w.appendChild(it)});b.appendChild(w);tl.appendChild(b)});p.appendChild(tl)}
function renderMarkers(){const c=document.getElementById('mapCanvas');c.querySelectorAll('.location-marker').forEach(m=>m.remove());locations.forEach(l=>{const m=document.createElement('div');m.className=`location-marker ${l.visited?'marker-visited':''}`;m.id='marker-'+l.id;m.style.left=l.x+'px';m.style.top=l.y+'px';m.onclick=e=>{e.stopPropagation();showLocation(l)};m.innerHTML=`<div class="marker-label">${l.name}</div><div class="marker-dot"></div>`;c.appendChild(m)})}
document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active');document.getElementById('tab-search').classList.remove('active')})});
function buildSearchIndex(){const idx=[];locations.forEach(l=>idx.push({type:'Plats',name:l.name,action:()=>showLocation(l),locId:l.id}));characters.forEach(c=>idx.push({type:'Karaktär',name:c.name,action:()=>showCharacterDetail(c)}));npcsData.forEach(n=>idx.push({type:'NPC',name:n.name,desc:n.desc,action:()=>showNPCDetail(n)}));sessions.forEach(s=>s.events.forEach(ev=>idx.push({type:'Händelse',name:ev.title,action:()=>showTimelineDetail(ev),places:ev.places})));return idx}
let searchIndex=buildSearchIndex();
function normalize(s){return s.toLowerCase().replace(/[åä]/g,'a').replace(/[ö]/g,'o').replace(/[éè]/g,'e')}
function doSearch(q){if(!q.trim())return[];const n=normalize(q);return searchIndex.filter(i=>normalize(i.name).includes(n)||(i.desc&&normalize(i.desc).includes(n)))}
const searchInput=document.getElementById('searchInput'),suggestionsEl=document.getElementById('suggestions');
searchInput.addEventListener('input',()=>{const q=searchInput.value;if(q.length<2){suggestionsEl.classList.remove('active');return}const r=doSearch(q).slice(0,8);if(!r.length){suggestionsEl.classList.remove('active');return}suggestionsEl.innerHTML='';r.forEach(i=>{const d=document.createElement('div');d.className='suggestion-item';d.innerHTML=`<span class="s-type">${i.type}</span>${i.name}`;d.onclick=()=>{suggestionsEl.classList.remove('active');searchInput.value=i.name;if(i.action)i.action()};suggestionsEl.appendChild(d)});suggestionsEl.classList.add('active')});
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();executeSearch()}});
document.getElementById('searchBtn').addEventListener('click',executeSearch);
document.addEventListener('click',e=>{if(!e.target.closest('.search-bar'))suggestionsEl.classList.remove('active')});
function executeSearch(){suggestionsEl.classList.remove('active');const q=searchInput.value;if(!q.trim())return;const r=doSearch(q);const p=document.getElementById('tab-search');p.innerHTML='';const s=document.createElement('div');s.className='search-results active';s.innerHTML=`<div class="search-results-header"><h3>"${q}" (${r.length})</h3><button class="sr-close" onclick="closeSearchResults()">X</button></div>`;if(!r.length)s.innerHTML+='<div style="font-size:8px;color:#6a6a8e;padding:10px">Inga resultat.</div>';else r.forEach(i=>{const d=document.createElement('div');d.className='sr-item';d.innerHTML=`<span class="sr-type">${i.type}</span>${i.name}`;d.onclick=()=>{if(i.action)i.action();if(i.locId){highlightMarker(i.locId);setTimeout(()=>unhighlightMarker(i.locId),3000)}if(i.places)i.places.forEach(x=>{highlightMarker(x);setTimeout(()=>unhighlightMarker(x),3000)})};s.appendChild(d)});p.appendChild(s);document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));p.classList.add('active')}
function closeSearchResults(){document.getElementById('tab-search').classList.remove('active');document.querySelector('.tab-btn[data-tab="adventurers"]').classList.add('active');document.getElementById('tab-adventurers').classList.add('active');searchInput.value=''}
function showLocation(l){document.getElementById('popupTitle').textContent=l.name;document.getElementById('popupSummary').textContent=l.summary;const e=document.getElementById('popupEvents');e.innerHTML='<h3>HÄNDELSER</h3>';if(!l.events.length)e.innerHTML+='<div style="font-size:8px;color:#6a6a8e;padding:10px">Inga händelser ännu.</div>';else l.events.forEach((ev,i)=>{const d=document.createElement('div');d.className='event-item';d.innerHTML=`<div class="event-title">${ev.title}</div><div class="event-preview">${ev.preview}</div><div class="event-detail" id="ed_${l.id}_${i}">${ev.detail}</div>`;d.onclick=()=>document.getElementById(`ed_${l.id}_${i}`).classList.toggle('active');e.appendChild(d)});document.getElementById('overlay').classList.add('active');document.getElementById('locationPopup').classList.add('active')}
function showCharacterDetail(c){document.getElementById('charDetailName').textContent=c.name;document.getElementById('charDetailClass').textContent=c.subclass;document.getElementById('charDetailSpecies').textContent=c.species;const p=document.getElementById('charDetailPortrait');p.innerHTML='';const cv=document.createElement('canvas');p.appendChild(cv);drawPortrait(cv,c.id);const b=document.getElementById('charDetailBody');b.innerHTML='';const st=[];if(c.age)st.push({l:'Ålder',v:c.age});if(c.gender)st.push({l:'Kön',v:c.gender});if(c.org)st.push({l:'Organisation',v:c.org});if(c.appearance.skin)st.push({l:'Hy',v:c.appearance.skin});if(c.appearance.eyes)st.push({l:'Ögon',v:c.appearance.eyes});if(c.appearance.hair)st.push({l:'Hår',v:c.appearance.hair});st.forEach(s=>b.innerHTML+=`<div class="stat-row"><span class="stat-label">${s.l}</span><span class="stat-value">${s.v}</span></div>`);b.innerHTML+=`<div class="backstory"><h3>BAKGRUND</h3><p>${c.backstory}</p></div>`;if(c.personalEvents&&c.personalEvents.length){let h='<div class="personal-events"><h3>SENASTE HÄNDELSER</h3>';c.personalEvents.slice(0,5).forEach(e=>{h+=`<div class="pe-item"><div class="pe-label">${e.label}</div>${e.text}</div>`});h+='</div>';b.innerHTML+=h}document.getElementById('overlay').classList.add('active');document.getElementById('charDetailPopup').classList.add('active')}
function showNPCDetail(n){document.getElementById('npcDetailTitle').textContent=n.name;const b=document.getElementById('npcDetailBody');const sl={friendly:'Vänlig',hostile:'Fiende',neutral:'Neutral',unknown:'Okänd'};b.innerHTML=`<div class="npc-desc"><span class="npc-status ${n.status}" style="margin-bottom:8px">${sl[n.status]}</span><p style="margin-top:10px">${n.desc}</p></div>`;if(n.events&&n.events.length){let h='<div class="npc-events"><h3>HÄNDELSER MED THE BLITZ</h3>';n.events.forEach(e=>{h+=`<div class="pe-item"><div class="pe-label">${e.label}</div>${e.text}</div>`});h+='</div>';b.innerHTML+=h}else b.innerHTML+='<div class="npc-events"><h3>HÄNDELSER MED THE BLITZ</h3><div style="font-size:8px;color:#6a6a8e;padding:10px">Inga direkta interaktioner ännu.</div></div>';document.getElementById('overlay').classList.add('active');document.getElementById('npcDetailPopup').classList.add('active')}
function showTimelineDetail(ev){document.getElementById('tlDetailTitle').textContent=ev.title;const b=document.getElementById('tlDetailBody');b.innerHTML=`<div class="recap">${ev.recap}</div>`;if(ev.places.length){let h='<div class="ref-section"><h4>PLATSER</h4><ul class="ref-list">';ev.places.forEach(pid=>{const loc=locations.find(l=>l.id===pid);if(loc)h+=`<li class="place-ref" onmouseenter="highlightMarker('${pid}')" onmouseleave="unhighlightMarker('${pid}')" onclick="closePopup();setTimeout(()=>showLocation(locations.find(l=>l.id==='${pid}')),100)"><span class="ref-icon">&#9679;</span>${loc.name}</li>`});h+='</ul></div>';b.innerHTML+=h}if(ev.npcs&&ev.npcs.length){let h='<div class="ref-section"><h4>NPCs</h4><ul class="ref-list">';ev.npcs.forEach(n=>h+=`<li class="npc-ref"><span class="ref-icon">&#9670;</span>${n}</li>`);h+='</ul></div>';b.innerHTML+=h}document.getElementById('overlay').classList.add('active');document.getElementById('tlDetail').classList.add('active')}
function highlightMarker(id){const m=document.getElementById('marker-'+id);if(m)m.classList.add('highlighted')}
function unhighlightMarker(id){const m=document.getElementById('marker-'+id);if(m)m.classList.remove('highlighted')}
function closePopup(){document.getElementById('overlay').classList.remove('active');['locationPopup','charDetailPopup','tlDetail','npcDetailPopup'].forEach(id=>document.getElementById(id).classList.remove('active'));document.querySelectorAll('.location-marker.highlighted').forEach(m=>m.classList.remove('highlighted'))}
let scale=1,panX=0,panY=0,isDragging=false,dragSX,dragSY;
function updateTransform(){document.getElementById('mapCanvas').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`}
const vp=document.getElementById('mapViewport');
vp.addEventListener('mousedown',e=>{if(e.target.closest('.location-marker'))return;isDragging=true;dragSX=e.clientX-panX;dragSY=e.clientY-panY});
window.addEventListener('mousemove',e=>{if(!isDragging)return;panX=e.clientX-dragSX;panY=e.clientY-dragSY;updateTransform()});
window.addEventListener('mouseup',()=>isDragging=false);
vp.addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(.3,Math.min(2.5,scale+(e.deltaY>0?-.1:.1)));updateTransform()});
function zoomIn(){scale=Math.min(2.5,scale+.15);updateTransform()}
function zoomOut(){scale=Math.max(.3,scale-.15);updateTransform()}
function resetView(){centerOnVisited()}
function centerOnVisited(){const v=locations.filter(l=>l.visited);if(!v.length)return;let x1=Infinity,x2=-Infinity,y1=Infinity,y2=-Infinity;v.forEach(l=>{if(l.x<x1)x1=l.x;if(l.x>x2)x2=l.x;if(l.y<y1)y1=l.y;if(l.y>y2)y2=l.y});const pad=200;x1-=pad;x2+=pad;y1-=pad;y2+=pad;const cx=(x1+x2)/2,cy=(y1+y2)/2;const ma=document.querySelector('.map-container');const vw=ma.clientWidth,vh=ma.clientHeight;scale=Math.min(vw/(x2-x1),vh/(y2-y1),1.5);scale=Math.max(.5,Math.min(1.5,scale));panX=vw/2-cx*scale;panY=vh/2-cy*scale;updateTransform()}
drawMap();renderCharacters();renderNPCs();renderTimeline();renderMarkers();setTimeout(centerOnVisited,100);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup()});
</script>
</body>
</html>
