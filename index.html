<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Blitz - Sword Coast Campaign Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0d8c0;font-family:'Press Start 2P',monospace;overflow:hidden;height:100vh;width:100vw}
.app{display:flex;height:100vh;width:100vw}

/* SIDEBAR */
.sidebar{width:300px;min-width:300px;background:#0f0f23;border-right:4px solid #4a3728;display:flex;flex-direction:column;z-index:10}
.sidebar-title{text-align:center;padding:12px 8px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid #4a3728}
.sidebar-title h1{font-size:20px;color:#ffd700;text-shadow:2px 2px 0 #8b6914,0 0 10px rgba(255,215,0,.5);letter-spacing:4px}
.sidebar-title .subtitle{font-size:7px;color:#8b7355;margin-top:5px;letter-spacing:2px}

/* SEARCH */
.search-bar{padding:8px;background:#0a0a1e;border-bottom:3px solid #4a3728;position:relative}
.search-wrap{display:flex;gap:4px}
.search-input{flex:1;background:#1a1a2e;border:2px solid #2a2a4e;color:#e0d8c0;font-family:'Press Start 2P',monospace;font-size:7px;padding:7px 8px;border-radius:3px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:#ffd700}
.search-input::placeholder{color:#4a4a6e}
.search-btn{background:#2a1a0e;border:2px solid #4a3728;color:#ffd700;font-family:'Press Start 2P',monospace;font-size:8px;padding:6px 10px;cursor:pointer;border-radius:3px;transition:all .2s}
.search-btn:hover{border-color:#ffd700;background:#3a2a1e}
.suggestions{position:absolute;left:8px;right:8px;top:100%;background:#0f0f23;border:2px solid #4a3728;border-top:none;border-radius:0 0 4px 4px;z-index:20;display:none;max-height:200px;overflow-y:auto}
.suggestions.active{display:block}
.suggestion-item{padding:7px 10px;font-size:6px;color:#c0b898;cursor:pointer;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;gap:6px;transition:all .15s}
.suggestion-item:hover{background:#1a1a38;color:#ffd700}
.suggestion-item .s-type{font-size:5px;color:#6a6a8e;min-width:40px}
.search-results{display:none}
.search-results.active{display:block}
.search-results-header{display:flex;justify-content:space-between;align-items:center;padding:4px 0 8px;border-bottom:2px solid #2a2a4e;margin-bottom:8px}
.search-results-header h3{font-size:7px;color:#8b7355}
.sr-close{font-size:8px;color:#6a6a8e;cursor:pointer;background:none;border:1px solid #2a2a4e;padding:2px 6px;font-family:'Press Start 2P',monospace;border-radius:2px}
.sr-close:hover{color:#ffd700;border-color:#ffd700}
.sr-item{padding:8px;margin-bottom:4px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid #ffd700;cursor:pointer;transition:all .15s;font-size:7px;display:flex;align-items:center;gap:8px}
.sr-item:hover{border-color:#ffd700;background:#1a1a38;color:#ffd700}
.sr-item .sr-type{font-size:5px;color:#8b7355;min-width:36px;text-transform:uppercase}

/* TABS */
.tab-bar{display:flex;background:#0a0a1e;border-bottom:3px solid #4a3728}
.tab-btn{flex:1;padding:9px 4px;font-family:'Press Start 2P',monospace;font-size:7px;color:#6a6a8e;background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;text-align:center}
.tab-btn:hover{color:#c0b898;background:#1a1a2e}
.tab-btn.active{color:#ffd700;border-bottom-color:#ffd700;background:#1a1a2e}
.tab-content{flex:1;overflow-y:auto;padding:8px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* CHARACTER CARDS */
.character-card{display:flex;align-items:center;gap:10px;padding:10px 8px;margin-bottom:6px;background:#1a1a2e;border:2px solid #2a2a4e;border-radius:4px;cursor:pointer;transition:all .2s}
.character-card:hover{border-color:#ffd700;background:#1e1e3a;transform:translateX(4px)}
.portrait{width:48px;height:48px;min-width:48px;image-rendering:pixelated;border:2px solid #4a3728;background:#2a2a4e}
.portrait canvas{width:48px;height:48px;image-rendering:pixelated}
.char-info{display:flex;flex-direction:column;gap:3px;overflow:hidden}
.char-name{font-size:8px;color:#ffd700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char-class{font-size:6px;color:#8b7355}
.char-species{font-size:6px;color:#6a6a8e}

/* TIMELINE */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:#2a2a4e}
.session-block{margin-bottom:12px}
.session-header{font-size:8px;color:#ffd700;padding:6px 8px;background:#1a1a2e;border:2px solid #4a3728;border-radius:4px;position:relative;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.session-header:hover{border-color:#ffd700;background:#2a1a0e}
.session-header::before{content:'';position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:#ffd700;border:2px solid #8b6914;border-radius:2px}
.session-header .session-label{font-size:6px;color:#8b7355;display:block;margin-bottom:2px}
.session-header .toggle-icon{font-size:8px;color:#8b7355;transition:transform .2s;margin-left:auto;min-width:12px}
.session-block.collapsed .toggle-icon{transform:rotate(-90deg)}
.session-block.collapsed .session-events{display:none}
.session-events{margin-top:6px}
.timeline-event{margin:4px 0;padding:8px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid #6a4a2a;cursor:pointer;transition:all .2s;font-size:7px;color:#c0b898;line-height:1.6}
.timeline-event:hover{border-color:#ffd700;background:#1a1a38}
.timeline-event .te-title{color:#e0c878;margin-bottom:2px;font-size:7px}

/* POPUPS - shared */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:99}
.overlay.active{display:block}
.popup-close{font-size:14px;color:#8b7355;cursor:pointer;background:none;border:2px solid #4a3728;padding:4px 8px;font-family:'Press Start 2P',monospace;transition:all .2s}
.popup-close:hover{color:#ffd700;border-color:#ffd700}

/* LOCATION POPUP */
.location-popup,.char-detail-popup,.tl-detail{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0f0f23;border:4px solid #4a3728;border-radius:4px;z-index:100;overflow-y:auto;box-shadow:0 0 40px rgba(0,0,0,.8)}
.location-popup.active,.char-detail-popup.active,.tl-detail.active{display:block}
.location-popup{width:500px;max-height:80vh}
.char-detail-popup{width:420px;max-height:70vh}
.tl-detail{width:520px;max-height:80vh}

.popup-header,.char-detail-header,.tl-detail-header{padding:14px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid #4a3728;display:flex;justify-content:space-between;align-items:center}
.popup-header h2,.tl-detail-header h2{font-size:12px;color:#ffd700;text-shadow:2px 2px 0 #8b6914}
.popup-summary{padding:14px;font-size:8px;line-height:1.8;color:#c0b898;border-bottom:2px solid #2a2a4e}
.event-list{padding:8px 14px 14px}
.event-list h3{font-size:8px;color:#8b7355;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid #2a2a4e}
.event-item{padding:8px;margin-bottom:6px;background:#1a1a2e;border:2px solid #2a2a4e;border-left:4px solid #ffd700;cursor:pointer;transition:all .2s}
.event-item:hover{border-color:#ffd700;background:#1e1e3a}
.event-item .event-title{font-size:7px;color:#ffd700;margin-bottom:4px}
.event-item .event-preview{font-size:6px;color:#6a6a8e;line-height:1.6}
.event-detail{display:none;padding:10px;margin-top:6px;background:#0a0a1e;border:1px solid #2a2a4e;font-size:7px;color:#c0b898;line-height:1.8}
.event-detail.active{display:block}

/* CHAR DETAIL */
.char-detail-header{gap:14px;justify-content:flex-start}
.char-detail-portrait{width:64px;height:64px;min-width:64px;image-rendering:pixelated;border:3px solid #ffd700}
.char-detail-portrait canvas{width:64px;height:64px;image-rendering:pixelated}
.char-detail-info h2{font-size:11px;color:#ffd700;text-shadow:2px 2px 0 #8b6914}
.char-detail-info .detail-class{font-size:8px;color:#c0b898;margin-top:4px}
.char-detail-info .detail-species{font-size:7px;color:#6a6a8e;margin-top:2px}
.char-detail-body{padding:14px;font-size:7px;line-height:1.8;color:#c0b898}
.char-detail-body .stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #2a2a4e}
.char-detail-body .stat-label{color:#8b7355}
.char-detail-body .stat-value{color:#ffd700}
.char-detail-body .backstory{margin-top:12px;padding-top:12px;border-top:2px solid #2a2a4e}
.char-detail-body .backstory h3{font-size:8px;color:#8b7355;margin-bottom:8px}

/* TIMELINE DETAIL */
.tl-detail-body{padding:14px}
.tl-detail-body .recap{font-size:7px;line-height:1.8;color:#c0b898;margin-bottom:14px}
.ref-section{margin-top:10px}
.ref-section h4{font-size:7px;color:#8b7355;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #2a2a4e}
.ref-list{list-style:none}
.ref-list li{padding:5px 8px;margin-bottom:3px;font-size:7px;cursor:pointer;border:1px solid transparent;border-radius:3px;transition:all .15s;display:flex;align-items:center;gap:6px}
.ref-list li:hover{border-color:#ffd700;background:#1a1a38;color:#ffd700}
.ref-list li .ref-icon{font-size:6px;min-width:12px}
.ref-list li.place-ref .ref-icon{color:#ff6b35}
.ref-list li.npc-ref .ref-icon{color:#6ab4ff}

/* MAP */
.map-container{flex:1;position:relative;overflow:hidden;background:#071828}
.map-viewport{width:100%;height:100%;position:relative;overflow:hidden;cursor:grab}
.map-viewport:active{cursor:grabbing}
.map-canvas{position:absolute;transform-origin:0 0}
.map-svg{width:1800px;height:1200px}

/* MARKERS */
.location-marker{position:absolute;cursor:pointer;z-index:5;transition:transform .2s}
.location-marker:hover{transform:scale(1.3);z-index:6}
.location-marker.highlighted .marker-dot{background:#fff;border-color:#ffd700;box-shadow:0 0 20px #ffd700,0 0 40px rgba(255,215,0,.5)}
.marker-dot{width:18px;height:18px;background:#ffd700;border:3px solid #8b6914;border-radius:2px;animation:pulse 2.5s ease-in-out infinite}
.marker-visited .marker-dot{background:#ff6b35;border-color:#a0421f}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(255,215,0,.4)}50%{box-shadow:0 0 12px rgba(255,215,0,.7)}}
.marker-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:6px;color:#ffd700;text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 2px 4px rgba(0,0,0,.8);white-space:nowrap;pointer-events:none}

.map-title{position:absolute;top:16px;right:16px;z-index:8;text-align:right}
.map-title .map-subtitle{font-size:8px;color:#8b7355;letter-spacing:3px}
.zoom-controls{position:absolute;bottom:16px;right:16px;z-index:8;display:flex;flex-direction:column;gap:4px}
.zoom-btn{width:32px;height:32px;background:#0f0f23;border:2px solid #4a3728;color:#ffd700;font-family:'Press Start 2P',monospace;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.zoom-btn:hover{border-color:#ffd700;background:#1a1a2e}
.legend{position:absolute;bottom:16px;left:16px;z-index:8;background:rgba(15,15,35,.9);border:2px solid #4a3728;padding:8px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:6px}
.legend-dot{width:10px;height:10px;border:2px solid;border-radius:2px}
.legend-dot.visited{background:#ff6b35;border-color:#a0421f}
.legend-dot.known{background:#ffd700;border-color:#8b6914}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f0f23}::-webkit-scrollbar-thumb{background:#4a3728;border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-title"><h1>THE BLITZ</h1><div class="subtitle">TYRANNY OF DRAGONS</div></div>
    <div class="search-bar">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="S&#246;k plats, namn...">
        <button class="search-btn" id="searchBtn">&#x1F50D;</button>
      </div>
      <div class="suggestions" id="suggestions"></div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="adventurers">&#196;VENTYRARE</button>
      <button class="tab-btn" data-tab="history">HISTORIK</button>
    </div>
    <div class="tab-content">
      <div class="tab-panel active" id="tab-adventurers"></div>
      <div class="tab-panel" id="tab-history"></div>
      <div class="tab-panel" id="tab-search"></div>
    </div>
  </div>
  <div class="map-container">
    <div class="map-title"><div class="map-subtitle">SWORD COAST</div></div>
    <div class="map-viewport" id="mapViewport">
      <div class="map-canvas" id="mapCanvas">
        <svg class="map-svg" id="mapSvg" viewBox="0 0 1800 1200"></svg>
      </div>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" onclick="zoomOut()">-</button>
      <button class="zoom-btn" onclick="resetView()" style="font-size:8px">R</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot visited"></div><span>Bes&#246;kta platser</span></div>
      <div class="legend-item"><div class="legend-dot known"></div><span>K&#228;nda platser</span></div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="location-popup" id="locationPopup">
  <div class="popup-header"><h2 id="popupTitle"></h2><button class="popup-close" onclick="closePopup()">X</button></div>
  <div class="popup-summary" id="popupSummary"></div>
  <div class="event-list" id="popupEvents"><h3>H&#196;NDELSER</h3></div>
</div>
<div class="char-detail-popup" id="charDetailPopup">
  <div class="char-detail-header">
    <div class="char-detail-portrait" id="charDetailPortrait"></div>
    <div class="char-detail-info"><h2 id="charDetailName"></h2><div class="detail-class" id="charDetailClass"></div><div class="detail-species" id="charDetailSpecies"></div></div>
    <button class="popup-close" onclick="closePopup()" style="margin-left:auto">X</button>
  </div>
  <div class="char-detail-body" id="charDetailBody"></div>
</div>
<div class="tl-detail" id="tlDetail">
  <div class="tl-detail-header"><h2 id="tlDetailTitle"></h2><button class="popup-close" onclick="closePopup()">X</button></div>
  <div class="tl-detail-body" id="tlDetailBody"></div>
</div>

<script>

// ============ RENDER ============
function renderCharacters(){
  const list=document.getElementById('tab-adventurers'); list.innerHTML='';
  characters.forEach(c=>{
    const card=document.createElement('div');card.className='character-card';card.onclick=()=>showCharacterDetail(c);
    const pd=document.createElement('div');pd.className='portrait';const cv=document.createElement('canvas');pd.appendChild(cv);drawPortrait(cv,c.id);card.appendChild(pd);
    const info=document.createElement('div');info.className='char-info';
    info.innerHTML=`<div class="char-name">${c.name}</div><div class="char-class">${c.class} (${c.subclass})</div><div class="char-species">${c.species}</div>`;
    card.appendChild(info);list.appendChild(card);
  });
}

function renderTimeline(){
  const panel=document.getElementById('tab-history'); panel.innerHTML='';
  const tl=document.createElement('div');tl.className='timeline';
  sessions.forEach(s=>{
    const block=document.createElement('div');block.className='session-block';
    const hdr=document.createElement('div');hdr.className='session-header';
    hdr.innerHTML=`<div><span class="session-label">${s.label}</span>${s.title}</div><span class="toggle-icon">▼</span>`;
    hdr.onclick=()=>block.classList.toggle('collapsed');
    block.appendChild(hdr);
    const evWrap=document.createElement('div');evWrap.className='session-events';
    s.events.forEach(ev=>{
      const item=document.createElement('div');item.className='timeline-event';
      item.innerHTML=`<div class="te-title">${ev.title}</div>`;
      item.onclick=e=>{e.stopPropagation();showTimelineDetail(ev)};
      evWrap.appendChild(item);
    });
    block.appendChild(evWrap);tl.appendChild(block);
  });
  panel.appendChild(tl);
}

function renderMarkers(){
  const canvas=document.getElementById('mapCanvas');
  canvas.querySelectorAll('.location-marker').forEach(m=>m.remove());
  locations.forEach(loc=>{
    const m=document.createElement('div');m.className=`location-marker ${loc.visited?'marker-visited':''}`;m.id='marker-'+loc.id;
    m.style.left=loc.x+'px';m.style.top=loc.y+'px';
    m.onclick=e=>{e.stopPropagation();showLocation(loc)};
    m.innerHTML=`<div class="marker-label">${loc.name}</div><div class="marker-dot"></div>`;
    canvas.appendChild(m);
  });
}

  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    // Hide search results panel
    document.getElementById('tab-search').classList.remove('active');
  });
});

// ============ SEARCH ============
function buildSearchIndex(){
  const idx=[];
  locations.forEach(l=>{idx.push({type:'Plats',name:l.name,action:()=>showLocation(l),locId:l.id})});
  characters.forEach(c=>{idx.push({type:'Karaktär',name:c.name,action:()=>showCharacterDetail(c)})});
  npcs.forEach(n=>{idx.push({type:'NPC',name:n.name,desc:n.desc})});
  sessions.forEach(s=>{
    s.events.forEach(ev=>{idx.push({type:'Händelse',name:ev.title,action:()=>showTimelineDetail(ev),places:ev.places})});
  });
  return idx;
}
const searchIndex=buildSearchIndex();

function normalize(s){return s.toLowerCase().replace(/[åä]/g,'a').replace(/[ö]/g,'o').replace(/[éè]/g,'e')}

function doSearch(q){
  if(!q.trim()) return [];
  const nq=normalize(q);
  return searchIndex.filter(item=>{
    const nn=normalize(item.name);
    if(nn.includes(nq)) return true;
    if(item.desc && normalize(item.desc).includes(nq)) return true;
    return false;
  });
}

const searchInput=document.getElementById('searchInput');
const suggestionsEl=document.getElementById('suggestions');

searchInput.addEventListener('input',()=>{
  const q=searchInput.value;
  if(q.length<2){suggestionsEl.classList.remove('active');suggestionsEl.innerHTML='';return}
  const results=doSearch(q).slice(0,8);
  if(!results.length){suggestionsEl.classList.remove('active');return}
  suggestionsEl.innerHTML='';
  results.forEach(r=>{
    const item=document.createElement('div');item.className='suggestion-item';
    item.innerHTML=`<span class="s-type">${r.type}</span>${r.name}`;
    item.onclick=()=>{
      suggestionsEl.classList.remove('active');searchInput.value=r.name;
      if(r.action) r.action();
      else if(r.locId) showLocation(locations.find(l=>l.id===r.locId));
    };
    suggestionsEl.appendChild(item);
  });
  suggestionsEl.classList.add('active');
});

searchInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();executeSearch()}});
document.getElementById('searchBtn').addEventListener('click',executeSearch);
document.addEventListener('click',e=>{if(!e.target.closest('.search-bar'))suggestionsEl.classList.remove('active')});

function executeSearch(){
  suggestionsEl.classList.remove('active');
  const q=searchInput.value;
  if(!q.trim())return;
  const results=doSearch(q);
  // Show results in a tab panel
  const panel=document.getElementById('tab-search');
  panel.innerHTML='';
  const sr=document.createElement('div');sr.className='search-results active';
  sr.innerHTML=`<div class="search-results-header"><h3>Resultat: "${q}" (${results.length})</h3><button class="sr-close" onclick="closeSearchResults()">X</button></div>`;
  if(!results.length){sr.innerHTML+='<div style="font-size:7px;color:#6a6a8e;padding:8px">Inga resultat hittades.</div>'}
  else results.forEach(r=>{
    const item=document.createElement('div');item.className='sr-item';
    item.innerHTML=`<span class="sr-type">${r.type}</span>${r.name}`;
    item.onclick=()=>{
      if(r.action) r.action();
      else if(r.locId) showLocation(locations.find(l=>l.id===r.locId));
      if(r.locId){highlightMarker(r.locId);setTimeout(()=>unhighlightMarker(r.locId),3000)}
      if(r.places&&r.places.length){r.places.forEach(p=>{highlightMarker(p);setTimeout(()=>unhighlightMarker(p),3000)})}
    };
    sr.appendChild(item);
  });
  panel.innerHTML='';panel.appendChild(sr);
  // Switch to search results tab
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  panel.classList.add('active');
}

function closeSearchResults(){
  document.getElementById('tab-search').classList.remove('active');
  document.querySelector('.tab-btn[data-tab="adventurers"]').classList.add('active');
  document.getElementById('tab-adventurers').classList.add('active');
  searchInput.value='';
}

// ============ POPUPS ============
function showLocation(loc){
  document.getElementById('popupTitle').textContent=loc.name;
  document.getElementById('popupSummary').textContent=loc.summary;
  const ec=document.getElementById('popupEvents');ec.innerHTML='<h3>HÄNDELSER</h3>';
  if(!loc.events.length)ec.innerHTML+='<div style="font-size:7px;color:#6a6a8e;padding:8px">Inga händelser registrerade ännu.</div>';
  else loc.events.forEach((ev,i)=>{
    const item=document.createElement('div');item.className='event-item';
    item.innerHTML=`<div class="event-title">${ev.title}</div><div class="event-preview">${ev.preview}</div><div class="event-detail" id="ed_${loc.id}_${i}">${ev.detail}</div>`;
    item.onclick=()=>document.getElementById(`ed_${loc.id}_${i}`).classList.toggle('active');
    ec.appendChild(item);
  });
  document.getElementById('overlay').classList.add('active');document.getElementById('locationPopup').classList.add('active');
}
function showCharacterDetail(c){
  document.getElementById('charDetailName').textContent=c.name;
  document.getElementById('charDetailClass').textContent=`${c.class} – ${c.subclass}`;
  document.getElementById('charDetailSpecies').textContent=c.species;
  const pd=document.getElementById('charDetailPortrait');pd.innerHTML='';const cv=document.createElement('canvas');pd.appendChild(cv);drawPortrait(cv,c.id);
  const body=document.getElementById('charDetailBody');body.innerHTML='';
  const stats=[];
  if(c.age)stats.push({l:'Ålder',v:c.age});if(c.gender)stats.push({l:'Kön',v:c.gender});
  if(c.org)stats.push({l:'Organisation',v:c.org});
  if(c.appearance.skin)stats.push({l:'Hy',v:c.appearance.skin});if(c.appearance.eyes)stats.push({l:'Ögon',v:c.appearance.eyes});if(c.appearance.hair)stats.push({l:'Hår',v:c.appearance.hair});
  stats.forEach(s=>body.innerHTML+=`<div class="stat-row"><span class="stat-label">${s.l}</span><span class="stat-value">${s.v}</span></div>`);
  body.innerHTML+=`<div class="backstory"><h3>BAKGRUND</h3><p>${c.backstory}</p></div>`;
  document.getElementById('overlay').classList.add('active');document.getElementById('charDetailPopup').classList.add('active');
}
function showTimelineDetail(ev){
  document.getElementById('tlDetailTitle').textContent=ev.title;
  const body=document.getElementById('tlDetailBody');
  body.innerHTML=`<div class="recap">${ev.recap}</div>`;
  if(ev.places.length){
    let h='<div class="ref-section"><h4>PLATSER</h4><ul class="ref-list">';
    ev.places.forEach(pid=>{const loc=locations.find(l=>l.id===pid);if(loc)h+=`<li class="place-ref" data-place="${pid}" onmouseenter="highlightMarker('${pid}')" onmouseleave="unhighlightMarker('${pid}')" onclick="closePopup();setTimeout(()=>showLocation(locations.find(l=>l.id==='${pid}')),100)"><span class="ref-icon">&#9679;</span>${loc.name}</li>`});
    h+='</ul></div>';body.innerHTML+=h;
  }
  if(ev.npcs&&ev.npcs.length){
    let h='<div class="ref-section"><h4>NPCs</h4><ul class="ref-list">';
    ev.npcs.forEach(npc=>h+=`<li class="npc-ref"><span class="ref-icon">&#9670;</span>${npc}</li>`);
    h+='</ul></div>';body.innerHTML+=h;
  }
  document.getElementById('overlay').classList.add('active');document.getElementById('tlDetail').classList.add('active');
}
function highlightMarker(id){const m=document.getElementById('marker-'+id);if(m)m.classList.add('highlighted')}
function unhighlightMarker(id){const m=document.getElementById('marker-'+id);if(m)m.classList.remove('highlighted')}
function closePopup(){
  document.getElementById('overlay').classList.remove('active');
  ['locationPopup','charDetailPopup','tlDetail'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.querySelectorAll('.location-marker.highlighted').forEach(m=>m.classList.remove('highlighted'));
}

// ============ PAN & ZOOM ============
let scale=.75,panX=-150,panY=-50,isDragging=false,dragSX,dragSY;
function updateTransform(){document.getElementById('mapCanvas').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`}
const vp=document.getElementById('mapViewport');
vp.addEventListener('mousedown',e=>{if(e.target.closest('.location-marker'))return;isDragging=true;dragSX=e.clientX-panX;dragSY=e.clientY-panY});
window.addEventListener('mousemove',e=>{if(!isDragging)return;panX=e.clientX-dragSX;panY=e.clientY-dragSY;updateTransform()});
window.addEventListener('mouseup',()=>isDragging=false);
vp.addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(.3,Math.min(2,scale+(e.deltaY>0?-.1:.1)));updateTransform()});
function zoomIn(){scale=Math.min(2,scale+.15);updateTransform()}
function zoomOut(){scale=Math.max(.3,scale-.15);updateTransform()}
function resetView(){scale=.75;panX=-150;panY=-50;updateTransform()}

// ============ INIT ============
drawMap();renderCharacters();renderTimeline();renderMarkers();updateTransform();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup()});
</script>
