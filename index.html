<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gråstensväktarna - Sword Coast</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--font:'Silkscreen','Courier New',monospace;--bg:#0f0f23;--bg2:#1a1a2e;--border:#4a3728;--gold:#ffd700;--text:#e0d8c0;--muted:#8b7355;--dim:#6a6a8e;--dark:#0a0a1e}
body{background:var(--bg2);color:var(--text);font-family:var(--font);overflow:hidden;height:100vh;height:100dvh;width:100vw}
.app{display:flex;height:100vh;height:100dvh;width:100vw}

/* SIDEBAR */
.sidebar{width:400px;min-width:400px;background:var(--bg);border-right:4px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-title{text-align:center;padding:16px 12px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid var(--border)}
.sidebar-title h1{font-size:16px;color:var(--gold);text-shadow:2px 2px 0 #8b6914,0 0 10px rgba(255,215,0,.5);letter-spacing:2px}
.sidebar-title .subtitle{font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:2px}
.search-bar{padding:10px 12px;background:var(--dark);border-bottom:3px solid var(--border);position:relative}
.search-wrap{display:flex;gap:6px}
.search-input{flex:1;background:var(--bg2);border:2px solid #2a2a4e;color:var(--text);font-family:var(--font);font-size:11px;padding:10px 12px;border-radius:4px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:#4a4a6e}
.search-btn{background:#2a1a0e;border:2px solid var(--border);color:var(--gold);font-family:var(--font);font-size:12px;padding:8px 14px;cursor:pointer;border-radius:4px;transition:all .2s}
.search-btn:hover{border-color:var(--gold)}
.suggestions{position:absolute;left:12px;right:12px;top:100%;background:var(--bg);border:2px solid var(--border);border-top:none;border-radius:0 0 4px 4px;z-index:20;display:none;max-height:240px;overflow-y:auto}
.suggestions.active{display:block}
.suggestion-item{padding:10px 14px;font-size:11px;color:#c0b898;cursor:pointer;border-bottom:1px solid var(--bg2);display:flex;align-items:center;gap:10px;transition:all .15s}
.suggestion-item:hover{background:#1a1a38;color:var(--gold)}
.suggestion-item .s-type{font-size:9px;color:var(--dim);min-width:50px}
.tab-bar{display:flex;background:var(--dark);border-bottom:3px solid var(--border)}
.tab-btn{flex:1;padding:11px 4px;font-family:var(--font);font-size:10px;color:var(--dim);background:transparent;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;text-align:center}
.tab-btn:hover{color:#c0b898;background:var(--bg2)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--bg2)}
.tab-content{flex:1;overflow-y:auto;padding:12px}
.tab-panel{display:none}.tab-panel.active{display:block}

/* CARDS */
.character-card,.npc-card{display:flex;align-items:center;gap:14px;padding:14px 12px;margin-bottom:10px;background:var(--bg2);border:2px solid #2a2a4e;border-radius:6px;cursor:pointer;transition:all .2s}
.character-card:hover{border-color:var(--gold);background:#1e1e3a;transform:translateX(4px)}
.npc-card:hover{border-color:#6ab4ff;background:#1e1e3a;transform:translateX(4px)}
.portrait{width:56px;height:56px;min-width:56px;image-rendering:pixelated;border:2px solid var(--border);background:#2a2a4e;border-radius:4px}
.portrait canvas{width:56px;height:56px;image-rendering:pixelated}
.char-info,.npc-info{display:flex;flex-direction:column;gap:4px;overflow:hidden}
.char-name{font-size:12px;color:var(--gold)}
.char-class{font-size:10px;color:var(--muted)}
.char-species{font-size:9px;color:var(--dim)}
.npc-icon{width:44px;height:44px;min-width:44px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--bg2);image-rendering:pixelated;position:relative}
.npc-icon canvas{width:44px;height:44px;image-rendering:pixelated;border-radius:4px}
.npc-icon .npc-status-badge{position:absolute;bottom:-3px;right:-3px;width:16px;height:16px;border-radius:50%;border:2px solid var(--bg);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:10px}
.npc-detail-header{padding:16px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid var(--border);display:flex;gap:16px;align-items:center}
.npc-detail-portrait{width:72px;height:72px;min-width:72px;image-rendering:pixelated;border:3px solid #6ab4ff;border-radius:6px;background:#2a2a4e}
.npc-detail-portrait canvas{width:72px;height:72px;image-rendering:pixelated}
.npc-detail-info{display:flex;flex-direction:column;gap:5px;overflow:hidden}
.npc-detail-info h2{font-size:14px;color:#6ab4ff;text-shadow:2px 2px 0 #1a3a6a}
.npc-detail-info .npc-role-label{font-size:10px;color:#c0b898}
.event-npc-chips{margin-top:10px;padding-top:8px;border-top:1px dashed #2a2a4e;display:flex;flex-wrap:wrap;gap:5px}
.event-npc-chip{font-size:9px;padding:4px 10px;background:#0e1a2a;color:#6ab4ff;border:1px solid #1a3a6a;border-radius:3px;cursor:pointer;transition:all .15s;font-family:var(--font);display:inline-flex;align-items:center;gap:4px}
.event-npc-chip:hover{border-color:#6ab4ff;background:#0e2a4a}
.event-npc-chip.unknown{cursor:default;opacity:.6;color:#8080a0;border-color:#3a3a5a}
.event-npc-chip.hostile{background:#2a0e0e;color:#e04a4a;border-color:#6a1a1a}
.event-npc-chip.hostile:hover{border-color:#e04a4a;background:#4a1a1a}
.filter-banner{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;margin-bottom:10px;background:#2a1a0e;border:2px solid var(--border);border-left:4px solid var(--gold);border-radius:4px;font-size:9px;color:var(--gold)}
.filter-banner .fb-label{display:flex;align-items:center;gap:6px}
.filter-banner-clear{background:none;border:1px solid var(--border);color:var(--muted);padding:3px 8px;font-family:var(--font);font-size:9px;cursor:pointer;border-radius:3px;transition:all .15s}
.filter-banner-clear:hover{color:var(--gold);border-color:var(--gold)}
.pe-session{font-size:9px;color:#b090d0;margin:6px 0 8px;cursor:pointer;transition:all .15s;display:block;padding:4px 8px;background:#1a1430;border-left:2px solid #6a4a8a;border-radius:2px;font-weight:700;letter-spacing:.3px}
.pe-session:hover{color:#ffd700;background:#2a1a3a;border-left-color:#ffd700}
.pe-text{display:block;margin-top:4px}
.npc-name{font-size:12px;color:#6ab4ff}
.npc-role{font-size:10px;color:var(--muted)}
.npc-status{font-size:9px;padding:3px 8px;border-radius:3px;display:inline-block;margin-top:3px}
.npc-status.friendly{background:#1a3a1a;color:#4ae04a;border:1px solid #2a6a2a}
.npc-status.hostile{background:#3a1a1a;color:#e04a4a;border:1px solid #6a2a2a}
.npc-status.neutral{background:#2a2a1a;color:#c0b060;border:1px solid #5a5a2a}
.npc-status.unknown{background:#1a1a2a;color:#8080a0;border:1px solid #3a3a5a}
.empty-state{font-size:11px;color:#4a4a6e;padding:24px;text-align:center;line-height:2}
.sr-item{padding:12px;margin-bottom:6px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid var(--gold);cursor:pointer;transition:all .15s;font-size:11px;display:flex;align-items:center;gap:10px}
.sr-item:hover{border-color:var(--gold);background:#1a1a38;color:var(--gold)}
.sr-item .sr-type{font-size:8px;color:var(--muted);min-width:44px;text-transform:uppercase}
.search-results{display:none}.search-results.active{display:block}
.search-results-header{display:flex;justify-content:space-between;align-items:center;padding:6px 0 10px;border-bottom:2px solid #2a2a4e;margin-bottom:10px}
.search-results-header h3{font-size:11px;color:var(--muted)}
.sr-close{font-size:10px;color:var(--dim);cursor:pointer;background:none;border:1px solid #2a2a4e;padding:4px 10px;font-family:var(--font);border-radius:3px}.sr-close:hover{color:var(--gold);border-color:var(--gold)}

/* TIMELINE */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:#2a2a4e}
.session-block{margin-bottom:14px}
.session-header{font-size:11px;color:var(--gold);padding:10px 12px;background:var(--bg2);border:2px solid var(--border);border-radius:6px;position:relative;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.session-header:hover{border-color:var(--gold);background:#2a1a0e}
.session-header::before{content:'';position:absolute;left:-20px;top:50%;transform:translateY(-50%);width:12px;height:12px;background:var(--gold);border:2px solid #8b6914;border-radius:2px}
.session-header .session-label{font-size:9px;color:var(--muted);display:block;margin-bottom:3px}
.session-header .toggle-icon{font-size:10px;color:var(--muted);transition:transform .2s;margin-left:auto}
.session-block.collapsed .toggle-icon{transform:rotate(-90deg)}
.session-block.collapsed .session-events{display:none}
.session-events{margin-top:8px}
.timeline-event{margin:5px 0;padding:10px 12px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid #6a4a2a;cursor:pointer;transition:all .2s;font-size:10px;color:#c0b898;line-height:1.6}
.timeline-event:hover{border-color:var(--gold);background:#1a1a38}
.timeline-event .te-title{color:#e0c878;font-size:10px}

/* POPUPS */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:99}.overlay.active{display:block}
.popup-close{font-size:16px;color:var(--muted);cursor:pointer;background:none;border:2px solid var(--border);padding:5px 10px;font-family:var(--font);transition:all .2s;border-radius:4px}.popup-close:hover{color:var(--gold);border-color:var(--gold)}
.char-detail-popup,.tl-detail,.npc-detail-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg);border:4px solid var(--border);border-radius:6px;z-index:100;overflow-y:auto;box-shadow:0 0 60px rgba(0,0,0,.8)}
.char-detail-popup.active,.tl-detail.active,.npc-detail-popup.active{display:block}
/* Location popup: fixed position near marker on screen */
.location-popup{display:none;position:fixed;background:var(--bg);border:3px solid var(--border);border-radius:6px;z-index:20;overflow-y:auto;box-shadow:0 4px 30px rgba(0,0,0,.7)}
.location-popup.active{display:block}
.location-popup{width:380px;max-width:calc(100vw - 16px);max-height:450px;overscroll-behavior:contain}
.char-detail-popup{width:560px;max-height:85vh}
.tl-detail{width:580px;max-height:85vh}
.npc-detail-popup{width:540px;max-height:80vh}
.popup-header,.tl-detail-header,.npc-detail-header{padding:18px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.location-popup .popup-header{position:sticky;top:0;z-index:2}
.popup-header h2,.tl-detail-header h2,.npc-detail-header h2{font-size:14px;color:var(--gold);text-shadow:2px 2px 0 #8b6914}
.popup-summary{padding:18px;font-size:12px;line-height:1.9;color:#c0b898;border-bottom:2px solid #2a2a4e}
.event-list{padding:12px 18px 18px}
.event-list h3{font-size:12px;color:var(--muted);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #2a2a4e}
.event-item{padding:12px;margin-bottom:10px;background:var(--bg2);border:2px solid #2a2a4e;border-left:4px solid var(--gold);cursor:pointer;transition:all .2s;border-radius:4px}
.event-item:hover{border-color:var(--gold);background:#1e1e3a}
.event-item .event-title{font-size:11px;color:var(--gold);margin-bottom:4px}
.event-item .event-preview{font-size:10px;color:var(--dim);line-height:1.6}
.event-detail{display:none;padding:12px;margin-top:8px;background:var(--dark);border:1px solid #2a2a4e;font-size:11px;color:#c0b898;line-height:1.9;border-radius:4px;white-space:pre-line}.event-detail.active{display:block}
.desc-list{padding:12px 18px 4px}
.desc-list h3{font-size:12px;color:var(--muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #2a2a4e}
.desc-section{padding:0;margin-bottom:8px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid #8aaaff;border-radius:4px;overflow:hidden}
.desc-section .desc-title{font-size:10px;color:#8aaaff;letter-spacing:.5px;padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:background .15s}
.desc-section .desc-title:hover{background:#1a1a38}
.desc-section .desc-title .desc-tog{font-size:9px;color:#6a8acc;transition:transform .2s}
.desc-section.collapsed .desc-title .desc-tog{transform:rotate(-90deg)}
.desc-section ul{list-style:none;padding:0 12px 10px;margin:0}
.desc-section.collapsed ul{display:none}
.desc-section li{font-size:10px;color:#c0b898;padding:3px 0 3px 14px;line-height:1.6;position:relative}
.desc-section li::before{content:'▸';position:absolute;left:0;color:#8aaaff}
.desc-section li strong{color:#e0c878;font-weight:400}
.event-session{font-size:8px;color:var(--dim);margin-top:4px;cursor:pointer;transition:color .15s}.event-session:hover{color:var(--gold)}

/* CHAR DETAIL */
.char-detail-header{padding:18px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:4px solid var(--border);display:flex;gap:18px;align-items:center}
.char-detail-portrait{width:80px;height:80px;min-width:80px;image-rendering:pixelated;border:3px solid var(--gold);border-radius:6px}
.char-detail-portrait canvas{width:80px;height:80px;image-rendering:pixelated}
.char-detail-info h2{font-size:14px;color:var(--gold);text-shadow:2px 2px 0 #8b6914}
.char-detail-info .detail-class{font-size:11px;color:#c0b898;margin-top:5px}
.char-detail-info .detail-species{font-size:10px;color:var(--dim);margin-top:3px}
.char-detail-body{padding:18px;font-size:11px;line-height:1.9;color:#c0b898}
.char-detail-body .stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a2a4e;font-size:11px}
.char-detail-body .stat-label{color:var(--muted)}.char-detail-body .stat-value{color:var(--gold)}
.section-toggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:10px 0;margin-top:14px;border-top:2px solid #2a2a4e}
.section-toggle h3{font-size:12px;color:var(--muted)}
.section-toggle .tog-icon{font-size:10px;color:var(--muted);transition:transform .2s}
.section-toggle.collapsed .tog-icon{transform:rotate(-90deg)}
.section-body{overflow:hidden;transition:max-height .3s ease}
.section-body.collapsed{max-height:0!important;padding:0!important;overflow:hidden}
.section-body p{font-size:11px;line-height:1.9;padding:8px 0}
.personal-events{margin-top:14px;padding-top:14px;border-top:2px solid #2a2a4e}
.personal-events h3{font-size:12px;color:var(--muted);margin-bottom:10px}
.pe-item{padding:10px 12px;margin-bottom:6px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid #6a4a8a;font-size:10px;color:#c0b898;line-height:1.7;border-radius:4px}
.pe-item .pe-label{color:#b090d0;font-size:10px;margin-bottom:3px;font-weight:700}

/* NPC/TL DETAIL */
.npc-detail-body{padding:18px;font-size:11px;line-height:1.9;color:#c0b898}
.npc-detail-body .npc-events{padding-top:14px;margin-top:14px;border-top:2px solid #2a2a4e}
.npc-detail-body .npc-events h3{font-size:12px;color:var(--muted);margin-bottom:10px}
.tl-detail-body{padding:18px}
.tl-detail-body .recap{font-size:11px;line-height:1.9;color:#c0b898;margin-bottom:14px}
.ref-section{margin-top:14px}
.ref-section h4{font-size:11px;color:var(--muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #2a2a4e}
.ref-list{list-style:none}
.ref-list li{padding:8px 12px;margin-bottom:5px;font-size:11px;cursor:pointer;border:1px solid transparent;border-radius:4px;transition:all .15s;display:flex;align-items:center;gap:10px}
.ref-list li:hover{border-color:var(--gold);background:#1a1a38;color:var(--gold)}
.ref-list li .ref-icon{font-size:9px;min-width:14px}
.ref-list li.place-ref .ref-icon{color:#ff6b35}
.ref-list li.npc-ref .ref-icon{color:#6ab4ff}

/* MAP */
.map-container{flex:1;position:relative;overflow:hidden;background:#071828}
.map-viewport{width:100%;height:100%;position:relative;overflow:hidden;cursor:grab;touch-action:none}.map-viewport:active{cursor:grabbing}
.map-canvas{position:absolute;transform-origin:0 0;width:2576px;height:1664px;background:url('map.jpg') no-repeat;background-size:100% 100%;image-rendering:pixelated}
.location-marker{position:absolute;cursor:pointer;z-index:5;transition:transform .2s}
.location-marker:hover{transform:scale(1.3);z-index:6}
.location-marker.highlighted .marker-dot{background:#fff;border-color:var(--gold);box-shadow:0 0 20px var(--gold),0 0 40px rgba(255,215,0,.5)}
.marker-dot{width:20px;height:20px;background:var(--gold);border:3px solid #8b6914;border-radius:3px;animation:pulse 2.5s ease-in-out infinite}
.marker-visited .marker-dot{background:#ff6b35;border-color:#a0421f;width:26px;height:26px;border-width:4px}
.marker-visited .marker-label{font-size:11px;font-weight:700}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(255,215,0,.4)}50%{box-shadow:0 0 14px rgba(255,215,0,.7)}}
.marker-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--gold);text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 2px 6px rgba(0,0,0,.9);white-space:nowrap;pointer-events:none}
.map-title{position:absolute;top:16px;right:16px;z-index:8}
.map-title .map-subtitle{font-size:10px;color:var(--muted);letter-spacing:3px}
.zoom-controls{position:absolute;bottom:16px;right:16px;z-index:8;display:flex;flex-direction:column;gap:4px}
.zoom-btn{width:38px;height:38px;background:var(--bg);border:2px solid var(--border);color:var(--gold);font-family:var(--font);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;border-radius:4px}
.zoom-btn:hover{border-color:var(--gold);background:var(--bg2)}
.session-filter{position:absolute;top:16px;left:16px;z-index:8}
.session-filter select{background:rgba(15,15,35,.92);border:2px solid var(--border);color:var(--gold);font-family:var(--font);font-size:10px;padding:8px 12px;border-radius:4px;cursor:pointer;outline:none}
.session-filter select:hover,.session-filter select:focus{border-color:var(--gold)}
.session-filter select option{background:var(--bg);color:var(--text)}
.location-marker.session-dimmed{opacity:.15;pointer-events:none;filter:grayscale(1);transition:opacity .3s,filter .3s}
.location-marker.session-dimmed .marker-label{display:none}
.location-marker.npc-glow .marker-dot{background:#6ab4ff;border-color:#3a8adf;box-shadow:0 0 20px #6ab4ff,0 0 40px rgba(106,180,255,.5)}
.recap-bar{padding:8px 12px;background:var(--dark);border-bottom:2px solid var(--border)}
.recap-btn{width:100%;padding:10px;font-family:var(--font);font-size:11px;color:var(--bg);background:linear-gradient(180deg,#ffd700,#c8a800);border:2px solid #8b6914;border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.recap-btn:hover{background:linear-gradient(180deg,#ffe44d,#dab800);box-shadow:0 0 15px rgba(255,215,0,.4)}
.recap-btn.active{background:linear-gradient(180deg,#c8a800,#a08600);box-shadow:inset 0 2px 4px rgba(0,0,0,.3)}
.recap-header{padding:14px;background:linear-gradient(180deg,#2a1a0e,#1a0f06);border-bottom:3px solid var(--border);border-radius:6px 6px 0 0;margin-bottom:12px}
.recap-header h2{font-size:13px;color:var(--gold);text-shadow:2px 2px 0 #8b6914}
.recap-header .recap-label{font-size:9px;color:var(--muted);margin-bottom:4px}
.recap-event{padding:10px 12px;margin-bottom:8px;background:#12122a;border:1px solid #2a2a4e;border-left:3px solid var(--gold);font-size:10px;color:#c0b898;line-height:1.7;border-radius:4px}
.recap-event .recap-event-title{color:#e0c878;font-size:11px;margin-bottom:4px}
.recap-section{margin-top:14px;padding-top:10px;border-top:2px solid #2a2a4e}
.recap-section h3{font-size:11px;color:var(--muted);margin-bottom:8px}
.recap-tag{display:inline-block;padding:4px 10px;margin:3px 4px 3px 0;font-size:9px;border-radius:3px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.recap-tag.place-tag{background:#1a1a0e;color:#ff6b35;border:1px solid #6a3a1a}
.recap-tag.place-tag:hover{border-color:#ff6b35;background:#2a1a0e}
.recap-tag.npc-tag{background:#0e1a2a;color:#6ab4ff;border:1px solid #1a3a6a}
.recap-tag.npc-tag:hover{border-color:#6ab4ff;background:#0e2a4a}
.legend{position:absolute;bottom:16px;left:16px;z-index:8;background:rgba(15,15,35,.92);border:2px solid var(--border);padding:10px 12px;border-radius:4px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:9px}
.legend-dot{width:12px;height:12px;border:2px solid;border-radius:3px}
.legend-dot.visited{background:#ff6b35;border-color:#a0421f}.legend-dot.known{background:var(--gold);border-color:#8b6914}

/* MOBILE */
@media(max-width:900px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:unset;height:55vh;border-right:none;border-bottom:4px solid var(--border)}
  .map-container{height:45vh}
  .sidebar-title{padding:10px 8px}
  .sidebar-title h1{font-size:18px}
  .location-popup,.char-detail-popup,.tl-detail,.npc-detail-popup{width:95vw;max-height:80vh;top:50%;left:50%}
  .marker-label{font-size:7px}
  .session-filter select{font-size:8px;padding:6px 8px;max-width:150px}
  .legend{bottom:8px;left:8px;padding:6px 8px}
  .zoom-controls{bottom:8px;right:8px}
  .zoom-btn{width:34px;height:34px;font-size:14px}
}
@media(max-width:500px){
  .sidebar{height:50vh}
  .map-container{height:50vh}
  .sidebar-title h1{font-size:16px;letter-spacing:2px}
  .tab-btn{font-size:8px;padding:8px 2px}
  .character-card,.npc-card{padding:10px 8px;gap:10px}
  .char-name,.npc-name{font-size:11px}
  .popup-header h2,.tl-detail-header h2,.npc-detail-header h2{font-size:12px}
}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>

<script>
/*
===================================================================
  GRÅSTENSVÄKTARNA – DATA SCHEMA & SESSION WORKFLOW
===================================================================

WORKFLOW FÖR ATT LÄGGA TILL EN NY SESSION:
1. Klistra in session-transkribering till Claude
2. Claude genererar: session-objekt, nya platser, nya NPCs, uppdateringar till befintliga platser
3. För nya platser: använd kalibreringsverktyget (klicka på tom yta på kartan → koordinater)
4. Skicka koordinaterna till Claude
5. Claude producerar färdig kod att klistra in

SESSION SCHEMA:
{
  id: number,               // Sekventiellt: 0, 1, 2...
  label: 'SESSION N',       // T.ex. 'SESSION 1'
  title: 'Kort titel',      // Svenska, beskrivande
  events: [{
    title: string,           // Händelsens namn
    recap: string,           // Sammanfattning av vad som hände
    places: ['locationId'],  // Array av location.id-strängar
    npcs: ['NPC Namn']       // Array av NPC-namn (måste matcha npcsData[].name exakt)
  }]
}

LOCATION SCHEMA (ny plats):
{
  id: 'kebab-case',          // Unikt ID, t.ex. 'castle-naerytar'
  name: 'Visningsnamn',
  x: number,                 // Pixelkoordinat på map.jpg (2576x1664) – använd kalibreringsverktyget!
  y: number,
  visited: true/false,
  summary: 'Kort beskrivning av platsen.',
  descriptions: [{           // VALFRITT: Platsbeskrivning (baser, dungeons, fort etc)
    title: 'RUBRIK I VERSALER',
    items: [                 // Korta snabblästa rader, stöder <strong>
      '<strong>Etikett:</strong> Beskrivning',
      'Enkel rad utan etikett'
    ]
  }],
  events: [{                 // Specifika händelser som skett på platsen
    title: string,
    preview: 'Kort förhandsgranskning...',
    detail: 'Fullständig beskrivning av händelsen.',
    session: number           // Matchar sessions[].id
  }]
}

NPC SCHEMA:
{
  name: string,              // Måste matcha sessions[].events[].npcs exakt
  status: 'friendly'|'hostile'|'neutral'|'unknown',
  role: 'Kort rollbeskrivning',
  desc: 'Längre beskrivning av NPCn.',
  events: [{                 // Interaktioner med Gråstensväktarna
    label: 'Kort rubrik',
    text: 'Beskrivning av interaktionen.'
  }]
}

BEFINTLIG PLATS – UPPDATERING:
- Pusha ny event till locations[].events med session: N
- Sätt visited: true om gruppen besökt platsen

KORSREFERENSER:
- session.events[].places måste använda location.id-värden
- session.events[].npcs måste matcha npcsData[].name exakt
- Varje refererad NPC/plats måste finnas i respektive array
===================================================================
*/

// ===== RENDER =====
function renderCharacters(){const l=document.getElementById('tab-adventurers');l.innerHTML='';characters.forEach(c=>{const d=document.createElement('div');d.className='character-card';d.onclick=()=>showCharacterDetail(c);const p=document.createElement('div');p.className='portrait';const cv=document.createElement('canvas');p.appendChild(cv);drawPortrait(cv,c.id);d.appendChild(p);const i=document.createElement('div');i.className='char-info';i.innerHTML=`<div class="char-name">${c.name}</div><div class="char-class">${c.subclass}</div><div class="char-species">${c.species}</div>`;d.appendChild(i);l.appendChild(d)})}
function renderNPCs(){const p=document.getElementById('tab-npcs');p.innerHTML='';if(!npcsData.length){p.innerHTML='<div class="empty-state">Inga NPC:er påträffade ännu.<br><br>NPC:er dyker upp här efter varje session.</div>';return}
// Filter NPCs by current session filter
let displayNpcs=npcsData;
if(currentSessionFilter!=='all'){
  const s=sessions.find(x=>x.id===parseInt(currentSessionFilter));
  if(s){
    const npcNames=new Set();
    s.events.forEach(ev=>{if(ev.npcs)ev.npcs.forEach(n=>npcNames.add(n))});
    displayNpcs=npcsData.filter(n=>npcNames.has(n.name));
    const banner=document.createElement('div');banner.className='filter-banner';
    banner.innerHTML=`<span class="fb-label">📜 Filtrerar: ${s.label}</span><button class="filter-banner-clear" onclick="clearSessionFilter()">Rensa</button>`;
    p.appendChild(banner);
  }
}
if(!displayNpcs.length){const empty=document.createElement('div');empty.className='empty-state';empty.textContent='Inga NPC:er påträffade i denna session.';p.appendChild(empty);return}
displayNpcs.forEach(n=>{const c=document.createElement('div');c.className='npc-card';c.onclick=()=>showNPCDetail(n);const ic=document.createElement('div');ic.className='npc-icon';const cv=document.createElement('canvas');ic.appendChild(cv);drawNpcPortrait(cv,n.id);const badge=document.createElement('div');badge.className='npc-status-badge';badge.textContent=n.status==='friendly'?'😊':n.status==='hostile'?'💀':'😐';ic.appendChild(badge);c.appendChild(ic);const i=document.createElement('div');i.className='npc-info';const sl={friendly:'Vänlig',hostile:'Fiende',neutral:'Neutral',unknown:'Okänd'};i.innerHTML=`<div class="npc-name">${n.name}</div><div class="npc-role">${n.role||''}</div><span class="npc-status ${n.status}">${sl[n.status]||'Okänd'}</span>`;c.appendChild(i);p.appendChild(c)})}
function renderTimeline(){const p=document.getElementById('tab-history');p.innerHTML='';const tl=document.createElement('div');tl.className='timeline';sessions.forEach(s=>{const b=document.createElement('div');b.className='session-block';const h=document.createElement('div');h.className='session-header';h.innerHTML=`<div><span class="session-label">${s.label}</span>${s.title}</div><span class="toggle-icon">▼</span>`;h.onclick=()=>b.classList.toggle('collapsed');b.appendChild(h);const w=document.createElement('div');w.className='session-events';s.events.forEach(ev=>{const it=document.createElement('div');it.className='timeline-event';it.innerHTML=`<div class="te-title">${ev.title}</div>`;it.onclick=e=>{e.stopPropagation();showTimelineDetail(ev)};w.appendChild(it)});b.appendChild(w);tl.appendChild(b)});p.appendChild(tl)}
function renderMarkers(){const c=document.getElementById('mapCanvas');c.querySelectorAll('.location-marker').forEach(m=>m.remove());locations.forEach(l=>{const m=document.createElement('div');m.className=`location-marker ${l.visited?'marker-visited':''}`;m.id='marker-'+l.id;m.style.left=l.x+'px';m.style.top=l.y+'px';m.onclick=e=>{e.stopPropagation();showLocation(l)};m.innerHTML=`<div class="marker-label">${l.name}</div><div class="marker-dot"></div>`;c.appendChild(m)})}

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(b=>{b.addEventListener('click',()=>{if(recapActive)exitRecapMode();document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active');document.getElementById('tab-search').classList.remove('active')})});

// ===== SEARCH =====
function buildSearchIndex(){const idx=[];locations.forEach(l=>idx.push({type:'Plats',name:l.name,action:()=>showLocation(l),locId:l.id}));characters.forEach(c=>idx.push({type:'Karaktär',name:c.name,action:()=>showCharacterDetail(c)}));npcsData.forEach(n=>idx.push({type:'NPC',name:n.name,desc:n.desc,action:()=>showNPCDetail(n)}));sessions.forEach(s=>s.events.forEach(ev=>idx.push({type:'Händelse',name:ev.title,action:()=>showTimelineDetail(ev),places:ev.places})));return idx}
let searchIndex=buildSearchIndex();
function normalize(s){return s.toLowerCase().replace(/[åä]/g,'a').replace(/[ö]/g,'o')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function doSearch(q){if(!q.trim())return[];const n=normalize(q);return searchIndex.filter(i=>normalize(i.name).includes(n)||(i.desc&&normalize(i.desc).includes(n)))}
const sI=document.getElementById('searchInput'),sE=document.getElementById('suggestions');
sI.addEventListener('input',()=>{const q=sI.value;if(q.length<2){sE.classList.remove('active');return}const r=doSearch(q).slice(0,8);if(!r.length){sE.classList.remove('active');return}sE.innerHTML='';r.forEach(i=>{const d=document.createElement('div');d.className='suggestion-item';d.innerHTML=`<span class="s-type">${i.type}</span>${i.name}`;d.onclick=()=>{sE.classList.remove('active');sI.value=i.name;if(i.action)i.action()};sE.appendChild(d)});sE.classList.add('active')});
sI.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();executeSearch()}});
document.getElementById('searchBtn').addEventListener('click',executeSearch);
document.addEventListener('click',e=>{if(!e.target.closest('.search-bar'))sE.classList.remove('active')});
function executeSearch(){sE.classList.remove('active');const q=sI.value;if(!q.trim())return;const r=doSearch(q);const p=document.getElementById('tab-search');p.innerHTML='';const s=document.createElement('div');s.className='search-results active';s.innerHTML=`<div class="search-results-header"><h3>"${esc(q)}" (${r.length})</h3><button class="sr-close" onclick="closeSearchResults()">X</button></div>`;if(!r.length)s.innerHTML+='<div class="empty-state">Inga resultat.</div>';else r.forEach(i=>{const d=document.createElement('div');d.className='sr-item';d.innerHTML=`<span class="sr-type">${i.type}</span>${i.name}`;d.onclick=()=>{if(i.action)i.action();if(i.locId){highlightMarker(i.locId);setTimeout(()=>unhighlightMarker(i.locId),3000)}if(i.places)i.places.forEach(x=>{highlightMarker(x);setTimeout(()=>unhighlightMarker(x),3000)})};s.appendChild(d)});p.appendChild(s);document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));p.classList.add('active')}
function closeSearchResults(){document.getElementById('tab-search').classList.remove('active');document.querySelector('.tab-btn[data-tab="adventurers"]').classList.add('active');document.getElementById('tab-adventurers').classList.add('active');sI.value=''}

// ===== POPUPS =====
function findEventSession(evTitle){for(const s of sessions){if(s.events.find(e=>e.title===evTitle))return s}return null}
function openSessionTab(sessionId){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="history"]').classList.add('active');
  document.getElementById('tab-history').classList.add('active');
  const blocks=document.querySelectorAll('.session-block');
  blocks.forEach(b=>{b.classList.add('collapsed')});
  if(blocks[sessionId]){blocks[sessionId].classList.remove('collapsed');blocks[sessionId].scrollIntoView({behavior:'smooth'})}
}
function getEventNpcs(ev){
  const names=new Set();
  // Match by session+title
  if(ev.session!==undefined){
    const s=sessions.find(x=>x.id===ev.session);
    if(s){
      const se=s.events.find(e=>e.title===ev.title);
      if(se&&se.npcs)se.npcs.forEach(n=>names.add(n));
    }
  }
  // Also scan detail/preview text for known NPC names
  const text=(ev.detail||'')+' '+(ev.preview||'');
  npcsData.forEach(npc=>{if(text.includes(npc.name))names.add(npc.name)});
  return[...names];
}
function showLocation(l){
  closePopup();
  const popup=document.getElementById('locationPopup');
  document.getElementById('popupTitle').textContent=l.name;
  document.getElementById('popupSummary').textContent=l.summary;
  // Descriptions section
  const dc=document.getElementById('popupDescriptions');
  if(l.descriptions&&l.descriptions.length){
    let dh='<h3>PLATSBESKRIVNING</h3>';
    l.descriptions.forEach(d=>{
      const items=d.items.map(i=>`<li>${i}</li>`).join('');
      dh+=`<div class="desc-section collapsed" onclick="this.classList.toggle('collapsed')"><div class="desc-title">${d.title}<span class="desc-tog">▼</span></div><ul>${items}</ul></div>`;
    });
    dc.innerHTML=dh;
    dc.style.display='block';
  }else{dc.innerHTML='';dc.style.display='none'}
  const e=document.getElementById('popupEvents');
  e.innerHTML='<h3>HÄNDELSER</h3>';
  if(!l.events.length) e.innerHTML+='<div class="empty-state">Inga händelser ännu.</div>';
  else l.events.forEach((ev,i)=>{
    const sess=ev.session!==undefined?sessions.find(s=>s.id===ev.session):null;
    const sessLabel=sess?`<div class="event-session" onclick="event.stopPropagation();openSessionTab(${sess.id})">📜 ${sess.label}</div>`:'';
    // NPC chips
    const npcNames=getEventNpcs(ev);
    let chipsHtml='';
    if(npcNames.length){
      chipsHtml='<div class="event-npc-chips">';
      npcNames.forEach(name=>{
        const npc=npcsData.find(x=>x.name===name);
        if(npc){const cls=npc.status==='hostile'?'event-npc-chip hostile':'event-npc-chip';chipsHtml+=`<span class="${cls}" onclick="event.stopPropagation();showNPCDetail(npcsData.find(x=>x.name==='${name.replace(/'/g,"\\'")}'))">👤 ${name}</span>`}
        else chipsHtml+=`<span class="event-npc-chip unknown">👤 ${name}</span>`;
      });
      chipsHtml+='</div>';
    }
    const d=document.createElement('div');d.className='event-item';
    d.innerHTML=`<div class="event-title">${ev.title}</div>${sessLabel}<div class="event-preview">${ev.preview}</div><div class="event-detail" id="ed_${l.id}_${i}">${ev.detail}${chipsHtml}</div>`;
    d.onclick=()=>document.getElementById(`ed_${l.id}_${i}`).classList.toggle('active');
    e.appendChild(d);
  });
  // Position in screen-space near the marker
  const ma=document.querySelector('.map-container');
  const maRect=ma.getBoundingClientRect();
  const sx=l.x*scale+panX+maRect.left+15;
  const sy=l.y*scale+panY+maRect.top;
  const popW=380,popH=450;
  let px=sx+20, py=sy-popH/2;
  // Keep within screen
  if(px+popW>window.innerWidth-8) px=sx-popW-20;
  if(px<8) px=8;
  if(py<8) py=8;
  if(py+popH>window.innerHeight-8) py=window.innerHeight-popH-8;
  popup.style.left=px+'px';
  popup.style.top=py+'px';
  popup.style.transform='';
  popup.classList.add('active');
  // Highlight marker
  const m=document.getElementById('marker-'+l.id);if(m)m.classList.add('highlighted');
}
function showCharacterDetail(ch){
  document.getElementById('charDetailName').textContent=ch.name;
  document.getElementById('charDetailClass').textContent=ch.subclass;
  document.getElementById('charDetailSpecies').textContent=ch.species;
  const p=document.getElementById('charDetailPortrait');p.innerHTML='';
  const cv=document.createElement('canvas');p.appendChild(cv);drawPortrait(cv,ch.id);
  const b=document.getElementById('charDetailBody');b.innerHTML='';
  // Collapsible stats
  const st=[];
  if(ch.age)st.push({l:'Ålder',v:ch.age});if(ch.gender)st.push({l:'Kön',v:ch.gender});
  if(ch.org)st.push({l:'Organisation',v:ch.org});
  if(ch.appearance.skin)st.push({l:'Hy',v:ch.appearance.skin});
  if(ch.appearance.eyes)st.push({l:'Ögon',v:ch.appearance.eyes});
  if(ch.appearance.hair)st.push({l:'Hår',v:ch.appearance.hair});
  if(st.length){
    let statsHtml='';st.forEach(s=>statsHtml+=`<div class="stat-row"><span class="stat-label">${s.l}</span><span class="stat-value">${s.v}</span></div>`);
    b.innerHTML+=`<div class="section-toggle collapsed" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')"><h3>DETALJER</h3><span class="tog-icon">▼</span></div><div class="section-body collapsed" style="max-height:400px">${statsHtml}</div>`;
  }
  // Collapsible backstory
  b.innerHTML+=`<div class="section-toggle collapsed" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')"><h3>BAKGRUND</h3><span class="tog-icon">▼</span></div><div class="section-body collapsed" style="max-height:600px"><p>${ch.backstory}</p></div>`;
  // Personal events (always visible)
  if(ch.personalEvents&&ch.personalEvents.length){
    let h='<div class="personal-events"><h3>SENASTE HÄNDELSER</h3>';
    ch.personalEvents.slice(0,5).forEach(e=>{const sess=e.session!==undefined?sessions.find(s=>s.id===e.session):null;const sl=sess?`<div class="pe-session" onclick="event.stopPropagation();closePopup();openSessionTab(${sess.id})">📜 ${sess.label}: ${sess.title}</div>`:'';h+=`<div class="pe-item"><div class="pe-label">${e.label}</div>${sl}<div class="pe-text">${e.text}</div></div>`});
    h+='</div>';b.innerHTML+=h;
  }
  document.getElementById('overlay').classList.add('active');
  document.getElementById('charDetailPopup').classList.add('active');
}
function showNPCDetail(n){document.getElementById('npcDetailTitle').textContent=n.name;document.getElementById('npcDetailRoleLabel').textContent=n.role||'';const pp=document.getElementById('npcDetailPortrait');pp.innerHTML='';const pcv=document.createElement('canvas');pp.appendChild(pcv);drawNpcPortrait(pcv,n.id);const b=document.getElementById('npcDetailBody');const sl={friendly:'Vänlig',hostile:'Fiende',neutral:'Neutral',unknown:'Okänd'};b.innerHTML=`<div><span class="npc-status ${n.status}" style="margin-bottom:10px">${sl[n.status]}</span><p style="margin-top:12px">${n.desc}</p></div>`;if(n.events&&n.events.length){let h='<div class="npc-events"><h3>HÄNDELSER MED GRÅSTENSVÄKTARNA</h3>';n.events.forEach(e=>{const sess=e.session!==undefined?sessions.find(s=>s.id===e.session):null;const sl=sess?`<div class="pe-session" onclick="event.stopPropagation();closePopup();openSessionTab(${sess.id})">📜 ${sess.label}: ${sess.title}</div>`:'';h+=`<div class="pe-item"><div class="pe-label">${e.label}</div>${sl}<div class="pe-text">${e.text}</div></div>`});h+='</div>';b.innerHTML+=h}else b.innerHTML+='<div class="npc-events"><h3>HÄNDELSER MED GRÅSTENSVÄKTARNA</h3><div class="empty-state">Inga direkta interaktioner ännu.</div></div>';const npcPlaces=getNpcPlaces(n.name);if(npcPlaces.length){let ph='<div class="npc-events"><h3>PLATSER</h3><ul class="ref-list">';npcPlaces.forEach(pid=>{const loc=locations.find(l=>l.id===pid);if(loc)ph+=`<li class="place-ref" onmouseenter="highlightMarkerNpc('${pid}')" onmouseleave="unhighlightMarkerNpc('${pid}')" onclick="closePopup();setTimeout(()=>showLocation(locations.find(l=>l.id==='${pid}')),100)"><span class="ref-icon">&#9679;</span>${loc.name}</li>`});ph+='</ul></div>';b.innerHTML+=ph}document.getElementById('overlay').classList.add('active');document.getElementById('npcDetailPopup').classList.add('active')}
function showTimelineDetail(ev){document.getElementById('tlDetailTitle').textContent=ev.title;const b=document.getElementById('tlDetailBody');b.innerHTML=`<div class="recap">${ev.recap}</div>`;if(ev.places.length){let h='<div class="ref-section"><h4>PLATSER</h4><ul class="ref-list">';ev.places.forEach(pid=>{const loc=locations.find(l=>l.id===pid);if(loc)h+=`<li class="place-ref" onmouseenter="highlightMarker('${pid}')" onmouseleave="unhighlightMarker('${pid}')" onclick="closePopup();setTimeout(()=>showLocation(locations.find(l=>l.id==='${pid}')),100)"><span class="ref-icon">&#9679;</span>${loc.name}</li>`});h+='</ul></div>';b.innerHTML+=h}if(ev.npcs&&ev.npcs.length){let h='<div class="ref-section"><h4>NPCs</h4><ul class="ref-list">';ev.npcs.forEach(n=>h+=`<li class="npc-ref"><span class="ref-icon">&#9670;</span>${n}</li>`);h+='</ul></div>';b.innerHTML+=h}document.getElementById('overlay').classList.add('active');document.getElementById('tlDetail').classList.add('active')}
function highlightMarker(id){const m=document.getElementById('marker-'+id);if(m)m.classList.add('highlighted')}
function unhighlightMarker(id){const m=document.getElementById('marker-'+id);if(m)m.classList.remove('highlighted')}
function closePopup(){document.getElementById('overlay').classList.remove('active');['charDetailPopup','tlDetail','npcDetailPopup'].forEach(id=>document.getElementById(id).classList.remove('active'));document.getElementById('locationPopup').classList.remove('active');document.querySelectorAll('.location-marker.highlighted').forEach(m=>m.classList.remove('highlighted'));document.querySelectorAll('.location-marker.npc-glow').forEach(m=>m.classList.remove('npc-glow'))}

// ===== PAN & ZOOM (mouse + touch) =====
let scale=1,panX=0,panY=0,isDragging=false,dragSX,dragSY;
function updateTransform(){document.getElementById('mapCanvas').style.transform=`translate(${panX}px,${panY}px) scale(${scale})`}
const vp=document.getElementById('mapViewport');
vp.addEventListener('mousedown',e=>{if(e.target.closest('.location-marker'))return;if(!e.target.closest('.location-popup'))closePopup();isDragging=true;dragSX=e.clientX-panX;dragSY=e.clientY-panY});
window.addEventListener('mousemove',e=>{if(!isDragging)return;panX=e.clientX-dragSX;panY=e.clientY-dragSY;updateTransform()});
window.addEventListener('mouseup',()=>isDragging=false);
vp.addEventListener('wheel',e=>{e.preventDefault();const ma=document.querySelector('.map-container');const vw=ma.clientWidth,vh=ma.clientHeight;const cx=vw/2,cy=vh/2;const oldScale=scale;scale=Math.max(.2,Math.min(2.5,scale+(e.deltaY>0?-.1:.1)));panX=cx-(cx-panX)*(scale/oldScale);panY=cy-(cy-panY)*(scale/oldScale);updateTransform()},{passive:false});
// Touch support
let lastTouchDist=0,lastTouchX=0,lastTouchY=0,touchDragging=false;
vp.addEventListener('touchstart',e=>{if(e.touches.length===1){touchDragging=true;lastTouchX=e.touches[0].clientX-panX;lastTouchY=e.touches[0].clientY-panY}if(e.touches.length===2){touchDragging=false;lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}},{passive:true});
vp.addEventListener('touchmove',e=>{if(e.touches.length===1&&touchDragging){panX=e.touches[0].clientX-lastTouchX;panY=e.touches[0].clientY-lastTouchY;updateTransform()}if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(lastTouchDist){const delta=(d-lastTouchDist)*.005;scale=Math.max(.3,Math.min(2.5,scale+delta))}lastTouchDist=d;updateTransform()}},{passive:true});
vp.addEventListener('touchend',()=>{touchDragging=false;lastTouchDist=0});
const MAP_W=2576,MAP_H=1664;
function zoomAroundCenter(newScale){
  const ma=document.querySelector('.map-container');
  const vw=ma.clientWidth,vh=ma.clientHeight;
  const cx=vw/2,cy=vh/2;
  const oldScale=scale;
  scale=Math.max(.2,Math.min(2.5,newScale));
  panX=cx-(cx-panX)*(scale/oldScale);
  panY=cy-(cy-panY)*(scale/oldScale);
  updateTransform();
}
function zoomIn(){zoomAroundCenter(scale+.15)}
function zoomOut(){zoomAroundCenter(scale-.15)}
function resetView(){fitMapToView()}
function fitMapToView(){
  const ma=document.querySelector('.map-container');
  const vw=ma.clientWidth,vh=ma.clientHeight;
  scale=Math.min(vw/MAP_W,vh/MAP_H);
  panX=(vw-MAP_W*scale)/2;
  panY=(vh-MAP_H*scale)/2;
  updateTransform();
}

document.getElementById('locationPopup').addEventListener('wheel',e=>e.stopPropagation(),{passive:false});
document.getElementById('locationPopup').addEventListener('mousedown',e=>e.stopPropagation());
document.getElementById('locationPopup').addEventListener('touchstart',e=>e.stopPropagation());
document.getElementById('locationPopup').addEventListener('touchmove',e=>e.stopPropagation());
// Calibration: click empty map area to see coordinates (desktop only)
document.getElementById('mapCanvas').addEventListener('click',function(e){
  if(e.target.closest('.location-marker')||e.target.closest('.location-popup'))return;
  if(window.innerWidth<=900)return; // hide on mobile
  const rect=this.getBoundingClientRect();
  const x=Math.round((e.clientX-rect.left)/scale);
  const y=Math.round((e.clientY-rect.top)/scale);
  const box=document.createElement('div');
  box.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#0f0f23;border:2px solid #ffd700;color:#ffd700;padding:12px 20px;font-family:var(--font);font-size:14px;z-index:999;border-radius:6px;cursor:pointer';
  box.textContent='x:'+x+',y:'+y;
  box.onclick=()=>{navigator.clipboard.writeText('x:'+x+',y:'+y);box.textContent='Kopierat!';setTimeout(()=>box.remove(),800)};
  document.body.appendChild(box);
  setTimeout(()=>box.remove(),5000);
});
// Session filter
let currentSessionFilter='all';
function populateSessionFilter(){const sel=document.getElementById('sessionFilter');sel.innerHTML='<option value="all">Alla sessioner</option>';sessions.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.label+': '+s.title;sel.appendChild(o)});sel.addEventListener('change',function(){filterMapBySession(this.value)})}
function filterMapBySession(val){currentSessionFilter=val;if(val==='all'){document.querySelectorAll('.location-marker').forEach(m=>m.classList.remove('session-dimmed'))}else{const s=sessions.find(x=>x.id===parseInt(val));if(s){const placeSet=new Set();s.events.forEach(ev=>ev.places.forEach(p=>placeSet.add(p)));locations.forEach(l=>{const m=document.getElementById('marker-'+l.id);if(!m)return;if(placeSet.has(l.id))m.classList.remove('session-dimmed');else m.classList.add('session-dimmed')})}}renderNPCs()}
function clearSessionFilter(){document.getElementById('sessionFilter').value='all';filterMapBySession('all')}

// NPC-to-place utility
function getNpcPlaces(npcName){const ps=new Set();sessions.forEach(s=>{s.events.forEach(ev=>{if(ev.npcs&&ev.npcs.some(n=>n.toLowerCase()===npcName.toLowerCase()))ev.places.forEach(p=>ps.add(p))})});return[...ps]}
function highlightMarkerNpc(id){const m=document.getElementById('marker-'+id);if(m)m.classList.add('npc-glow')}
function unhighlightMarkerNpc(id){const m=document.getElementById('marker-'+id);if(m)m.classList.remove('npc-glow')}

// Recap mode
let recapActive=false,recapHighlightedPlaces=[];
function toggleRecapMode(){if(recapActive){exitRecapMode();return}recapActive=true;document.getElementById('recapBtn').classList.add('active');document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.getElementById('tab-recap').classList.add('active');const last=sessions[sessions.length-1];renderRecap(last);const ps=new Set();last.events.forEach(ev=>ev.places.forEach(p=>ps.add(p)));recapHighlightedPlaces=[...ps];recapHighlightedPlaces.forEach(id=>highlightMarker(id));document.getElementById('sessionFilter').value=last.id;filterMapBySession(last.id)}
function exitRecapMode(){recapActive=false;document.getElementById('recapBtn').classList.remove('active');recapHighlightedPlaces.forEach(id=>unhighlightMarker(id));recapHighlightedPlaces=[];document.querySelector('.tab-btn[data-tab="adventurers"]').classList.add('active');document.getElementById('tab-adventurers').classList.add('active');document.getElementById('tab-recap').classList.remove('active');document.getElementById('sessionFilter').value='all';filterMapBySession('all')}
function renderRecap(s){const p=document.getElementById('tab-recap');let h=`<div class="recap-header"><div class="recap-label">${s.label}</div><h2>${s.title}</h2></div>`;s.events.forEach(ev=>{h+=`<div class="recap-event"><div class="recap-event-title">${ev.title}</div>${ev.recap}</div>`});const placeIds=new Set();s.events.forEach(ev=>ev.places.forEach(x=>placeIds.add(x)));if(placeIds.size){h+='<div class="recap-section"><h3>PLATSER</h3>';placeIds.forEach(pid=>{const loc=locations.find(l=>l.id===pid);if(loc)h+=`<span class="recap-tag place-tag" onmouseenter="highlightMarker('${pid}')" onmouseleave="unhighlightMarker('${pid}')" onclick="showLocation(locations.find(l=>l.id==='${pid}'))">${loc.name}</span>`});h+='</div>'}const npcNames=new Set();s.events.forEach(ev=>{if(ev.npcs)ev.npcs.forEach(n=>npcNames.add(n))});if(npcNames.size){h+='<div class="recap-section"><h3>NPCs</h3>';npcNames.forEach(name=>{const npc=npcsData.find(n=>n.name===name);if(npc)h+=`<span class="recap-tag npc-tag" onclick="showNPCDetail(npcsData.find(n=>n.name==='${name.replace(/'/g,"\\'")}'))">${name}</span>`;else h+=`<span class="recap-tag npc-tag" style="cursor:default">${name}</span>`});h+='</div>'}p.innerHTML=h}

renderCharacters();renderNPCs();renderTimeline();renderMarkers();populateSessionFilter();
document.getElementById('recapBtn').addEventListener('click',toggleRecapMode);
setTimeout(fitMapToView,150);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(recapActive)exitRecapMode();closePopup();sE.classList.remove('active')}});
</script>
